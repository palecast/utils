<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daylight Hours Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            color: white;
            margin-bottom: 28px;
            padding-top: 20px;
        }
        header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
        header p  { font-size: 1rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 28px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .city-selector {
            position: relative;
            flex: 1;
            min-width: 240px;
            max-width: 380px;
        }

        .city-input {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            color: #1f2937;
        }
        .city-input:focus { border-color: #667eea; }

        .city-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            max-height: 264px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 8px 28px rgba(0,0,0,0.13);
            display: none;
        }
        .city-dropdown.open { display: block; }

        .city-option {
            padding: 9px 16px;
            cursor: pointer;
            font-size: 0.93rem;
            color: #1f2937;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .city-option:hover, .city-option.highlighted { background: #f3f4f6; }
        .city-option .country { color: #9ca3af; font-size: 0.83rem; }

        .chart-wrapper {
            position: relative;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        canvas#chart {
            display: block;
            cursor: crosshair;
        }

        .tooltip {
            position: absolute;
            background: rgba(12, 16, 40, 0.93);
            color: #f0f0ff;
            padding: 10px 14px;
            border-radius: 9px;
            font-size: 0.83rem;
            pointer-events: none;
            display: none;
            white-space: nowrap;
            z-index: 50;
            line-height: 1.65;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tooltip-date { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; color: #c4b5fd; }
        .tooltip-row  { display: flex; gap: 8px; }
        .tooltip-label { opacity: 0.65; min-width: 72px; }

        .stats {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .stat-pill {
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 0.84rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-pill.shortest { background: #1e1b4b; color: #a5b4fc; }
        .stat-pill.longest  { background: #fef3c7; color: #92400e; }
        .stat-pill.today    { background: #ede9fe; color: #5b21b6; }
        .stat-label { opacity: 0.7; font-weight: 400; }

        .notice {
            font-size: 0.76rem;
            color: #9ca3af;
            margin-top: 10px;
            text-align: right;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            padding: 18px 0 10px;
        }
        footer a { color: rgba(255,255,255,0.85); }

        @media (max-width: 768px) {
            .card { padding: 18px 16px; }
            header h1 { font-size: 1.5rem; }
            .city-selector { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>&#9728;&#65039; Daylight Hours Visualizer</h1>

    <div class="card">
        <div class="controls">
            <div class="city-selector" id="citySelector">

                <div class="city-dropdown" id="cityDropdown"></div>
            </div>
        </div>

        <div class="chart-wrapper" id="chartWrapper">
            <canvas id="chart"></canvas>
            <div class="tooltip" id="tooltip"></div>
        </div>

        <div class="stats" id="stats"></div>
        <p class="notice">Times shown in standard time (DST not applied) · NOAA simplified solar algorithm</p>
    </div>

    <footer><a href="/disclaimer">Disclaimer</a> · No ads, no tracking.</footer>
</div>

// ─── Solar calculation (NOAA simplified) ─────────────────────────────────────
function getDayOfYear(date) {
    const start = new Date(date.getFullYear(), 0, 0);
    return Math.floor((date - start) / 86400000);
}

function solarCalc(doy, lat, lon, utcOffset) {
    const g = (2 * Math.PI / 365) * (doy - 1);

    const eqtime = 229.18 * (
        0.000075
        + 0.001868 * Math.cos(g)    - 0.032077 * Math.sin(g)
        - 0.014615 * Math.cos(2*g)  - 0.04089  * Math.sin(2*g)
    );

    const decl = 0.006918
        - 0.399912 * Math.cos(g)   + 0.070257 * Math.sin(g)
        - 0.006758 * Math.cos(2*g) + 0.000907 * Math.sin(2*g)
        - 0.002697 * Math.cos(3*g) + 0.001480 * Math.sin(3*g);

    const latRad = lat * Math.PI / 180;
    const cosHA = Math.cos(90.833 * Math.PI / 180)
                / (Math.cos(latRad) * Math.cos(decl))
                - Math.tan(latRad) * Math.tan(decl);

    if (cosHA >= 1)  return { polarNight: true };
    if (cosHA <= -1) return { midnightSun: true };

    const ha = Math.acos(cosHA);
    const solarNoon = 720 - 4 * lon - eqtime;
    const haDeg = ha * 180 / Math.PI;

    return {
        sunrise: solarNoon - 4 * haDeg + utcOffset * 60,
        sunset:  solarNoon + 4 * haDeg + utcOffset * 60,
    };
}

function computeYear(year, lat, lon, utcOffset) {
    const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
    const days = isLeap ? 366 : 365;
    const data = [];
    for (let d = 1; d <= days; d++) data.push(solarCalc(d, lat, lon, utcOffset));
    return data;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function minToHHMM(m) {
    if (m == null) return '\u2014';
    m = ((m % 1440) + 1440) % 1440;
    const h = Math.floor(m / 60), mm = Math.round(m % 60);
    return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

function minToDuration(m) {
    const h = Math.floor(m / 60), mm = Math.round(m % 60);
    return h + 'h ' + String(mm).padStart(2,'0') + 'm';
}

function doyToDate(doy, year) { return new Date(year, 0, doy); }

function dateLabel(date) {
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function monthBoundaries(isLeap) {
    const md = [31, isLeap ? 29 : 28, 31,30,31,30,31,31,30,31,30,31];
    const b = [0];
    for (const d of md) b.push(b[b.length-1] + d);
    return b;
}

const SOLAR_EVENTS = [
    { doy: 80 }, { doy: 172 }, { doy: 265 }, { doy: 355 },
];

// ─── Canvas drawing ───────────────────────────────────────────────────────────
const C_NIGHT  = '#0d1b4b';
const C_DAY    = '#fbbf24';
const C_GRID   = 'rgba(255,255,255,0.11)';
const C_TODAY  = '#f472b6';
const C_EVENT  = 'rgba(255,255,255,0.22)';
const TWILIGHT = 28; // minutes
const PAD = { L:46, R:14, T:18, B:30 };

let offscreen = null;

function drawChart(canvas, yearData, year, todayDoy) {
    const dpr   = window.devicePixelRatio || 1;
    const dispW = canvas.parentElement.clientWidth - 2;
    const dispH = Math.min(500, Math.max(300, Math.round(dispW * 0.44)));

    canvas.style.width  = dispW + 'px';
    canvas.style.height = dispH + 'px';
    canvas.width  = Math.round(dispW * dpr);
    canvas.height = Math.round(dispH * dpr);

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    renderBase(ctx, dispW, dispH, yearData, year, todayDoy);

    offscreen = document.createElement('canvas');
    offscreen.width  = canvas.width;
    offscreen.height = canvas.height;
    offscreen.getContext('2d').drawImage(canvas, 0, 0);
}

function renderBase(ctx, W, H, yearData, year, todayDoy) {
    const isLeap = yearData.length === 366;
    const days   = yearData.length;
    const cW = W - PAD.L - PAD.R;
    const cH = H - PAD.T - PAD.B;
    const dayPx = cW / days;
    const minPx = cH / 1440;
    const twPx  = TWILIGHT * minPx;

    ctx.clearRect(0, 0, W, H);

    // Night background
    ctx.fillStyle = C_NIGHT;
    ctx.fillRect(PAD.L, PAD.T, cW, cH);

    // Clip to chart area for the ribbon drawing
    ctx.save();
    ctx.beginPath();
    ctx.rect(PAD.L, PAD.T, cW, cH);
    ctx.clip();

    for (let d = 0; d < days; d++) {
        const r = yearData[d];
        const x = PAD.L + d * dayPx;
        const w = dayPx + 0.6; // slight overlap prevents sub-pixel gaps

        if (r.polarNight) continue;

        if (r.midnightSun) {
            ctx.fillStyle = C_DAY;
            ctx.fillRect(x, PAD.T, w, cH);
            continue;
        }

        const sr = Math.max(0, Math.min(1440, r.sunrise));
        const ss = Math.max(0, Math.min(1440, r.sunset));
        const srY = PAD.T + sr * minPx;
        const ssY = PAD.T + ss * minPx;

        // Solid daylight band
        const bTop = srY + twPx;
        const bBot = ssY - twPx;
        if (bBot > bTop) {
            ctx.fillStyle = C_DAY;
            ctx.fillRect(x, bTop, w, bBot - bTop);
        }

        // Sunrise twilight gradient
        const sr0 = Math.max(PAD.T, srY - twPx);
        const sr1 = Math.min(PAD.T + cH, srY + twPx);
        if (sr1 > sr0) {
            const g = ctx.createLinearGradient(0, sr0, 0, sr1);
            g.addColorStop(0, C_NIGHT); g.addColorStop(1, C_DAY);
            ctx.fillStyle = g;
            ctx.fillRect(x, sr0, w, sr1 - sr0);
        }

        // Sunset twilight gradient
        const ss0 = Math.max(PAD.T, ssY - twPx);
        const ss1 = Math.min(PAD.T + cH, ssY + twPx);
        if (ss1 > ss0) {
            const g = ctx.createLinearGradient(0, ss0, 0, ss1);
            g.addColorStop(0, C_DAY); g.addColorStop(1, C_NIGHT);
            ctx.fillStyle = g;
            ctx.fillRect(x, ss0, w, ss1 - ss0);
        }
    }
    ctx.restore();

    // Hour grid
    ctx.strokeStyle = C_GRID;
    ctx.lineWidth = 0.5;
    for (let h = 0; h <= 24; h++) {
        const y = PAD.T + (h / 24) * cH;
        ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(PAD.L + cW, y); ctx.stroke();
    }

    // Hour labels
    ctx.fillStyle = '#94a3b8';
    ctx.font = '10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const hStep = cH < 380 ? 4 : 2;
    for (let h = 0; h <= 24; h += hStep) {
        const y = PAD.T + (h / 24) * cH;
        ctx.fillText(String(h).padStart(2,'0') + ':00', PAD.L - 5, y);
    }

    // Month lines + labels
    const mB = monthBoundaries(isLeap);
    ctx.strokeStyle = C_GRID;
    ctx.lineWidth = 0.75;
    ctx.fillStyle = '#6b7280';
    ctx.font = '10.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';

    for (let m = 0; m < 12; m++) {
        const x = PAD.L + (mB[m] / days) * cW;
        ctx.beginPath(); ctx.moveTo(x, PAD.T); ctx.lineTo(x, PAD.T + cH); ctx.stroke();
        const midX = PAD.L + ((mB[m] + mB[m+1]) / 2 / days) * cW;
        ctx.fillText(MONTHS_SHORT[m], midX, PAD.T + cH + 5);
    }
    ctx.beginPath();
    ctx.moveTo(PAD.L + cW, PAD.T); ctx.lineTo(PAD.L + cW, PAD.T + cH); ctx.stroke();

    // Solstice/equinox markers
    ctx.strokeStyle = C_EVENT;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    for (const ev of SOLAR_EVENTS) {
        const x = PAD.L + ((ev.doy - 1) / days) * cW;
        ctx.beginPath(); ctx.moveTo(x, PAD.T); ctx.lineTo(x, PAD.T + cH); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Today marker
    if (todayDoy >= 1 && todayDoy <= days) {
        const x = PAD.L + ((todayDoy - 0.5) / days) * cW;
        ctx.strokeStyle = C_TODAY;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(x, PAD.T); ctx.lineTo(x, PAD.T + cH); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = C_TODAY;
        ctx.font = 'bold 10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
        const align = x < PAD.L + cW / 2 ? 'left' : 'right';
        ctx.textAlign = align; ctx.textBaseline = 'alphabetic';
        ctx.fillText('Today', x + (align === 'left' ? 3 : -3), PAD.T - 4);
    }

    // Chart border
    ctx.strokeStyle = 'rgba(255,255,255,0.13)';
    ctx.lineWidth = 1;
    ctx.strokeRect(PAD.L, PAD.T, cW, cH);
}

function drawHoverLine(canvas, dayIdx, days) {
    if (!offscreen) return;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(offscreen, 0, 0);

    const dpr  = window.devicePixelRatio || 1;
    const dispW = parseFloat(canvas.style.width);
    const dispH = parseFloat(canvas.style.height);
    const cW = dispW - PAD.L - PAD.R;
    const cH = dispH - PAD.T - PAD.B;
    const x  = PAD.L + (dayIdx + 0.5) / days * cW;

    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, PAD.T); ctx.lineTo(x, PAD.T + cH); ctx.stroke();
    ctx.restore();
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function computeStats(yearData, todayDoy) {
    let shortest = { dur: Infinity, doy: -1 };
    let longest  = { dur: -Infinity, doy: -1 };

    yearData.forEach((r, i) => {
        if (r.polarNight || r.midnightSun) return;
        const dur = r.sunset - r.sunrise;
        if (dur < shortest.dur) { shortest = { dur, doy: i + 1 }; }
        if (dur > longest.dur)  { longest  = { dur, doy: i + 1 }; }
    });

    const tr = yearData[todayDoy - 1];
    let todayDur = null;
    if (tr) {
        if (tr.midnightSun) todayDur = 1440;
        else if (!tr.polarNight) todayDur = tr.sunset - tr.sunrise;
    }

    return { shortest, longest, todayDur };
}

function renderStats(container, yearData, year, todayDoy) {
    while (container.firstChild) container.removeChild(container.firstChild);
    const { shortest, longest, todayDur } = computeStats(yearData, todayDoy);

    function makePill(cls, labelText, valueText) {
        const pill = document.createElement('div');
        pill.className = 'stat-pill ' + cls;
        const lbl = document.createElement('span');
        lbl.className = 'stat-label';
        lbl.textContent = labelText;
        const val = document.createElement('span');
        val.textContent = valueText;
        pill.appendChild(lbl);
        pill.appendChild(val);
        return pill;
    }

    if (shortest.doy > 0) {
        const d = dateLabel(doyToDate(shortest.doy, year));
        container.appendChild(makePill('shortest', 'Shortest day', d + ' \u00b7 ' + minToDuration(shortest.dur)));
    }
    if (longest.doy > 0) {
        const d = dateLabel(doyToDate(longest.doy, year));
        container.appendChild(makePill('longest', 'Longest day', d + ' \u00b7 ' + minToDuration(longest.dur)));
    }
    if (todayDur !== null) {
        container.appendChild(makePill('today', 'Today', minToDuration(todayDur)));
    }
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
function buildTooltip(tooltip, dayIdx, yearData, year) {
    while (tooltip.firstChild) tooltip.removeChild(tooltip.firstChild);

    const r       = yearData[dayIdx];
    const date    = doyToDate(dayIdx + 1, year);
    const dateStr = date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });

    const dateEl = document.createElement('div');
    dateEl.className = 'tooltip-date';
    dateEl.textContent = dateStr;
    tooltip.appendChild(dateEl);

    function addRow(label, value) {
        const row = document.createElement('div');
        row.className = 'tooltip-row';
        const lbl = document.createElement('span');
        lbl.className = 'tooltip-label';
        lbl.textContent = label;
        const val = document.createElement('span');
        val.textContent = value;
        row.appendChild(lbl);
        row.appendChild(val);
        tooltip.appendChild(row);
    }

    if (r.polarNight) {
        addRow('', 'Polar night');
    } else if (r.midnightSun) {
        addRow('', 'Midnight sun');
    } else {
        addRow('Sunrise', minToHHMM(r.sunrise));
        addRow('Sunset',  minToHHMM(r.sunset));
        addRow('Daylight', minToDuration(r.sunset - r.sunrise));
    }
}

function positionTooltip(tooltip, canvas, clientX, clientY) {
    tooltip.style.display = 'block';
    const wrapper = canvas.parentElement;
    const rect    = wrapper.getBoundingClientRect();
    let tx = clientX - rect.left + 14;
    let ty = clientY - rect.top  - 10;
    if (tx + tooltip.offsetWidth + 4 > wrapper.clientWidth) {
        tx = clientX - rect.left - tooltip.offsetWidth - 14;
    }
    ty = Math.max(4, Math.min(ty, wrapper.clientHeight - tooltip.offsetHeight - 4));
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
}

function hideTooltip(tooltip, canvas) {
    tooltip.style.display = 'none';
    if (offscreen) canvas.getContext('2d').drawImage(offscreen, 0, 0);
}

function clientXToDay(canvas, clientX, days) {
    const rect = canvas.getBoundingClientRect();
    const dispW = parseFloat(canvas.style.width);
    const cW = dispW - PAD.L - PAD.R;
    const cx = clientX - rect.left - PAD.L;
    return Math.max(0, Math.min(days - 1, Math.floor((cx / cW) * days)));
}

// ─── Dropdown ─────────────────────────────────────────────────────────────────
let dropItems = [];
let dropHover = -1;

function filterCities(q) {
    if (!q.trim()) return [];
    const lq = q.trim().toLowerCase();
    return CITIES.filter(c =>
        c[0].toLowerCase().includes(lq) ||
        (COUNTRY_NAMES[c[1]] || '').toLowerCase().includes(lq)
    ).slice(0, 60);
}

function renderDropdown(items, dropdown, onSelect) {
    while (dropdown.firstChild) dropdown.removeChild(dropdown.firstChild);
    dropHover = -1;
    if (!items.length) { dropdown.classList.remove('open'); return; }

    items.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'city-option';

        const name = document.createElement('span');
        name.textContent = c[0];

        const country = document.createElement('span');
        country.className = 'country';
        country.textContent = COUNTRY_NAMES[c[1]] || c[1];

        div.appendChild(name);
        div.appendChild(country);
        div.addEventListener('mousedown', e => { e.preventDefault(); onSelect(c); });
        dropdown.appendChild(div);
    });
    dropdown.classList.add('open');
}

function moveHighlight(delta, dropdown) {
    const opts = dropdown.querySelectorAll('.city-option');
    if (!opts.length) return;
    dropHover = Math.max(-1, Math.min(opts.length - 1, dropHover + delta));
    opts.forEach((el, i) => el.classList.toggle('highlighted', i === dropHover));
    if (dropHover >= 0) opts[dropHover].scrollIntoView({ block: 'nearest' });
}

const YEAR      = new Date().getFullYear();
const TODAY_DOY = getDayOfYear(new Date());

let currentCity     = null;
let currentYearData = null;

function loadCity(city) {
    currentCity     = city;
    currentYearData = computeYear(YEAR, city[2], city[3], city[4]);

    const canvas  = document.getElementById('chart');
    const stats   = document.getElementById('stats');
    const tooltip = document.getElementById('tooltip');

    tooltip.style.display = 'none';
    offscreen = null;

    drawChart(canvas, currentYearData, YEAR, TODAY_DOY);
    renderStats(stats, currentYearData, YEAR, TODAY_DOY);

    try { localStorage.setItem('daylightCity', JSON.stringify(city)); } catch(e) { /* quota */ }
}

(function init() {
    const input    = document.getElementById('cityInput');
    const dropdown = document.getElementById('cityDropdown');
    const canvas   = document.getElementById('chart');
    const tooltip  = document.getElementById('tooltip');

    function selectCity(city) {
        const country = COUNTRY_NAMES[city[1]] || city[1];
        input.value = city[0] + ', ' + country;
        dropdown.classList.remove('open');
        dropItems = [];
        loadCity(city);
    }

    input.addEventListener('input', () => {
        dropItems = filterCities(input.value);
        renderDropdown(dropItems, dropdown, selectCity);
    });

    input.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown')  { e.preventDefault(); moveHighlight(1, dropdown); }
        else if (e.key === 'ArrowUp')   { e.preventDefault(); moveHighlight(-1, dropdown); }
        else if (e.key === 'Enter') {
            e.preventDefault();
            const pick = dropHover >= 0 ? dropItems[dropHover] : dropItems[0];
            if (pick) selectCity(pick);
        } else if (e.key === 'Escape') {
            dropdown.classList.remove('open');
        }
    });

    input.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 150));
    input.addEventListener('focus', () => { if (dropItems.length) dropdown.classList.add('open'); });

    // Pointer interaction
    function handlePointer(clientX, clientY) {
        if (!currentYearData) return;
        const rect  = canvas.getBoundingClientRect();
        const x     = clientX - rect.left;
        const dispW = parseFloat(canvas.style.width);
        if (x < PAD.L || x > dispW - PAD.R) { hideTooltip(tooltip, canvas); return; }

        const dayIdx = clientXToDay(canvas, clientX, currentYearData.length);
        drawHoverLine(canvas, dayIdx, currentYearData.length);
        buildTooltip(tooltip, dayIdx, currentYearData, YEAR);
        positionTooltip(tooltip, canvas, clientX, clientY);
    }

    canvas.addEventListener('mousemove',  e => handlePointer(e.clientX, e.clientY));
    canvas.addEventListener('mouseleave', () => hideTooltip(tooltip, canvas));
    canvas.addEventListener('touchmove',  e => {
        e.preventDefault();
        const t = e.touches[0];
        handlePointer(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('touchend', () => hideTooltip(tooltip, canvas));

    // Resize
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { if (currentCity) loadCity(currentCity); }, 180);
    });

    // Restore saved city or default to London
    let defaultCity = CITIES.find(c => c[0] === 'London') || CITIES[0];
    try {
        const saved = JSON.parse(localStorage.getItem('daylightCity'));
        if (Array.isArray(saved) && saved.length === 5) defaultCity = saved;
    } catch(e) { /* ignore */ }

    selectCity(defaultCity);
}());
</script>
