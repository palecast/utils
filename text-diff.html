<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Diff</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAF8F5;
            --surface: #FFFFFF;
            --text: #3A2F28;
            --text-muted: #6B5F54;
            --accent: #4A5D47;
            --accent-hover: #3D4E3B;
            --border: rgba(74, 93, 71, 0.12);
            --border-strong: rgba(74, 93, 71, 0.2);
            --pill-bg: #E8E5DF;
            --shadow: 0 10px 30px rgba(58, 47, 40, 0.08);

            --added-bg: #E3EFDC;
            --added-gutter: #4A5D47;
            --removed-bg: #F8DCD8;
            --removed-gutter: #C0392B;
            --changed-bg: #FFF3CD;
            --changed-gutter: #B8860B;
            --blank-bg: rgba(232, 229, 223, 0.4);

            --mono: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, Menlo, monospace;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 20px 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .lead {
            margin-top: 8px;
            font-weight: 300;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .panes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .pane {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pane-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pane-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-right: auto;
        }

        .btn-outline {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            font: 500 12px 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-outline:hover { background: var(--blank-bg); border-color: var(--border-strong); }

        .caption {
            font-size: 12px;
            color: var(--text-muted);
            width: 100%;
            min-height: 16px;
            line-height: 1.3;
            word-break: break-all;
        }
        .caption:empty::before { content: '\00a0'; }

        .text-input {
            width: 100%;
            min-height: 280px;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.5;
            color: var(--text);
            resize: vertical;
            transition: border-color 0.2s;
        }
        .text-input:focus { outline: none; border-color: var(--accent); }
        .text-input.dragging { border-color: var(--accent); background: var(--blank-bg); }

        .action-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: var(--surface);
            font: 600 14px 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .stats {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--pill-bg);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .stats .stat-added { color: var(--added-gutter); }
        .stats .stat-removed { color: var(--removed-gutter); }
        .stats .stat-changed { color: var(--changed-gutter); }

        .change-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-nav {
            padding: 6px 10px;
            font-size: 13px;
            line-height: 1;
        }
        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .change-counter {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            min-width: 64px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .result {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .empty-state {
            padding: 60px 24px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.05rem;
        }

        .diff-wrap {
            overflow-x: auto;
        }

        .diff {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.5;
            table-layout: fixed;
        }

        .diff col.ln { width: 48px; }
        .diff col.line { width: calc(50% - 48px); }

        .diff td {
            padding: 2px 10px;
            vertical-align: top;
            white-space: pre-wrap;
            word-break: break-word;
            border-top: 1px solid var(--border);
        }

        .diff tr:first-child td { border-top: none; }

        .diff td.ln {
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            user-select: none;
            background: var(--blank-bg);
            border-right: 1px solid var(--border);
        }

        .diff td.line { color: var(--text); }

        .diff tr.equal td.line { background: var(--surface); }

        .diff tr.added td.line-right { background: var(--added-bg); border-left: 3px solid var(--added-gutter); padding-left: 8px; }
        .diff tr.added td.ln-right   { background: var(--added-bg); color: var(--added-gutter); }
        .diff tr.added td.line-left,
        .diff tr.added td.ln-left    { background: var(--blank-bg); }

        .diff tr.removed td.line-left { background: var(--removed-bg); border-left: 3px solid var(--removed-gutter); padding-left: 8px; }
        .diff tr.removed td.ln-left   { background: var(--removed-bg); color: var(--removed-gutter); }
        .diff tr.removed td.line-right,
        .diff tr.removed td.ln-right  { background: var(--blank-bg); }

        .diff tr.changed td.line-left  { background: var(--changed-bg); border-left: 3px solid var(--changed-gutter); padding-left: 8px; }
        .diff tr.changed td.line-right { background: var(--changed-bg); border-left: 3px solid var(--changed-gutter); padding-left: 8px; }
        .diff tr.changed td.ln-left,
        .diff tr.changed td.ln-right   { background: var(--changed-bg); color: var(--changed-gutter); }

        .diff tr.current td.ln {
            background: var(--accent);
            color: #fff;
        }

        footer {
            margin-top: 40px;
            padding: 24px;
            text-align: center;
            font: 300 0.875rem 'Inter', sans-serif;
            color: var(--text-muted);
        }
        footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--text); }

        .visually-hidden {
            position: absolute;
            width: 1px; height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .panes { grid-template-columns: 1fr; gap: 16px; }
            .diff { font-size: 12px; }
            .diff td { padding: 2px 6px; }
            .diff col.ln { width: 36px; }
            .diff col.line { width: calc(50% - 36px); }
            .text-input { min-height: 220px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Text Diff</h1>
            <p class="lead">Compare two text snippets or files side by side. Lines show as added, removed, or changed.</p>
        </header>

        <section class="panes">
            <div class="pane">
                <div class="pane-header">
                    <span class="pane-label">Original</span>
                    <button type="button" class="btn-outline" data-load="left">Load file</button>
                    <button type="button" class="btn-outline" data-clear="left">Clear</button>
                    <input type="file" id="file-left" class="visually-hidden" accept=".txt,.md,.csv,.tsv,.json,.log,.js,.ts,.jsx,.tsx,.html,.css,.xml,.yml,.yaml,.ini,.conf,text/*">
                </div>
                <textarea id="input-left" class="text-input" spellcheck="false" placeholder="Paste or drop a text file here…"></textarea>
                <div class="caption" id="caption-left"></div>
            </div>

            <div class="pane">
                <div class="pane-header">
                    <span class="pane-label">Modified</span>
                    <button type="button" class="btn-outline" data-load="right">Load file</button>
                    <button type="button" class="btn-outline" data-clear="right">Clear</button>
                    <input type="file" id="file-right" class="visually-hidden" accept=".txt,.md,.csv,.tsv,.json,.log,.js,.ts,.jsx,.tsx,.html,.css,.xml,.yml,.yaml,.ini,.conf,text/*">
                </div>
                <textarea id="input-right" class="text-input" spellcheck="false" placeholder="Paste or drop a text file here…"></textarea>
                <div class="caption" id="caption-right"></div>
            </div>
        </section>

        <div class="action-bar">
            <button type="button" class="btn" id="btn-compare">Compare</button>
            <button type="button" class="btn-outline" id="btn-swap">Swap sides</button>
            <button type="button" class="btn-outline" id="btn-clear-both">Clear both</button>
            <div class="change-nav" id="change-nav" hidden>
                <button type="button" class="btn-outline btn-nav" id="btn-prev-change"
                        aria-label="Previous change" title="Previous change (Alt+↑)" disabled>▲</button>
                <span class="change-counter" id="change-counter"></span>
                <button type="button" class="btn-outline btn-nav" id="btn-next-change"
                        aria-label="Next change" title="Next change (Alt+↓)" disabled>▼</button>
            </div>
            <span class="stats" id="stats"></span>
        </div>

        <section class="result" id="result"></section>

        <footer>
            <a href="/disclaimer.html">Disclaimer &amp; Terms</a>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/diff@5/dist/diff.min.js"></script>
    <script>
        (function () {
            'use strict';

            const leftInput = document.getElementById('input-left');
            const rightInput = document.getElementById('input-right');
            const leftCaption = document.getElementById('caption-left');
            const rightCaption = document.getElementById('caption-right');
            const fileLeft = document.getElementById('file-left');
            const fileRight = document.getElementById('file-right');
            const result = document.getElementById('result');
            const stats = document.getElementById('stats');
            const changeNav = document.getElementById('change-nav');
            const changeCounter = document.getElementById('change-counter');
            const btnPrevChange = document.getElementById('btn-prev-change');
            const btnNextChange = document.getElementById('btn-next-change');

            const filenames = { left: '', right: '' };

            let hunkRows = [];
            let currentHunk = -1;

            function splitLines(value) {
                const arr = value.split('\n');
                if (arr.length && arr[arr.length - 1] === '') arr.pop();
                return arr;
            }

            function buildRows(leftText, rightText) {
                if (leftText === '' && rightText === '') return [];
                const parts = Diff.diffLines(leftText, rightText);
                const rows = [];
                let leftNo = 0, rightNo = 0;

                for (let i = 0; i < parts.length; i++) {
                    const p = parts[i];
                    const lines = splitLines(p.value);

                    if (!p.added && !p.removed) {
                        for (const line of lines) {
                            leftNo++; rightNo++;
                            rows.push({ type: 'equal', leftNo, leftText: line, rightNo, rightText: line });
                        }
                        continue;
                    }

                    if (p.removed) {
                        const next = parts[i + 1];
                        if (next && next.added) {
                            const addLines = splitLines(next.value);
                            const pairCount = Math.min(lines.length, addLines.length);
                            for (let j = 0; j < pairCount; j++) {
                                leftNo++; rightNo++;
                                rows.push({ type: 'changed', leftNo, leftText: lines[j], rightNo, rightText: addLines[j] });
                            }
                            for (let j = pairCount; j < lines.length; j++) {
                                leftNo++;
                                rows.push({ type: 'removed', leftNo, leftText: lines[j], rightNo: null, rightText: null });
                            }
                            for (let j = pairCount; j < addLines.length; j++) {
                                rightNo++;
                                rows.push({ type: 'added', leftNo: null, leftText: null, rightNo, rightText: addLines[j] });
                            }
                            i++;
                        } else {
                            for (const line of lines) {
                                leftNo++;
                                rows.push({ type: 'removed', leftNo, leftText: line, rightNo: null, rightText: null });
                            }
                        }
                        continue;
                    }

                    if (p.added) {
                        for (const line of lines) {
                            rightNo++;
                            rows.push({ type: 'added', leftNo: null, leftText: null, rightNo, rightText: line });
                        }
                    }
                }

                let hunkIdx = -1;
                let inHunk = false;
                for (const r of rows) {
                    if (r.type === 'equal') {
                        r.hunkIndex = null;
                        inHunk = false;
                    } else {
                        if (!inHunk) { hunkIdx++; inHunk = true; }
                        r.hunkIndex = hunkIdx;
                    }
                }

                return rows;
            }

            function clearNode(node) {
                while (node.firstChild) node.removeChild(node.firstChild);
            }

            function showEmptyState(message) {
                clearNode(result);
                const div = document.createElement('div');
                div.className = 'empty-state';
                div.textContent = message;
                result.appendChild(div);
            }

            function makeCell(cls, text) {
                const td = document.createElement('td');
                td.className = cls;
                if (text != null) td.textContent = text;
                return td;
            }

            function renderRows(rows) {
                clearNode(result);
                hunkRows = [];
                currentHunk = -1;

                if (rows.length === 0) {
                    showEmptyState('Paste or load text on both sides to see the diff.');
                    updateNavUI();
                    return;
                }

                if (rows.every(r => r.type === 'equal')) {
                    showEmptyState('The two inputs are identical.');
                    updateNavUI();
                    return;
                }

                const wrap = document.createElement('div');
                wrap.className = 'diff-wrap';

                const table = document.createElement('table');
                table.className = 'diff';

                const colgroup = document.createElement('colgroup');
                ['ln', 'line', 'ln', 'line'].forEach(function (c) {
                    const col = document.createElement('col');
                    col.className = c;
                    colgroup.appendChild(col);
                });
                table.appendChild(colgroup);

                const tbody = document.createElement('tbody');
                for (const r of rows) {
                    const tr = document.createElement('tr');
                    tr.className = r.type;
                    if (r.hunkIndex != null) {
                        tr.dataset.hunk = String(r.hunkIndex);
                        if (!hunkRows[r.hunkIndex]) hunkRows[r.hunkIndex] = [];
                        hunkRows[r.hunkIndex].push(tr);
                    }
                    tr.appendChild(makeCell('ln ln-left', r.leftNo == null ? '' : String(r.leftNo)));
                    tr.appendChild(makeCell('line line-left', r.leftText == null ? '' : r.leftText));
                    tr.appendChild(makeCell('ln ln-right', r.rightNo == null ? '' : String(r.rightNo)));
                    tr.appendChild(makeCell('line line-right', r.rightText == null ? '' : r.rightText));
                    tbody.appendChild(tr);
                }
                table.appendChild(tbody);
                wrap.appendChild(table);
                result.appendChild(wrap);
                updateNavUI();
            }

            function updateNavUI() {
                const n = hunkRows.length;
                if (n === 0) {
                    changeNav.hidden = true;
                    btnPrevChange.disabled = true;
                    btnNextChange.disabled = true;
                    changeCounter.textContent = '';
                    return;
                }
                changeNav.hidden = false;
                btnPrevChange.disabled = false;
                btnNextChange.disabled = false;
                if (currentHunk === -1) {
                    changeCounter.textContent = n + (n === 1 ? ' change' : ' changes');
                } else {
                    changeCounter.textContent = (currentHunk + 1) + ' / ' + n;
                }
            }

            function gotoHunk(index) {
                const n = hunkRows.length;
                if (n === 0) return;
                const newIdx = ((index % n) + n) % n;
                if (currentHunk >= 0 && hunkRows[currentHunk]) {
                    for (const tr of hunkRows[currentHunk]) tr.classList.remove('current');
                }
                currentHunk = newIdx;
                const target = hunkRows[newIdx];
                for (const tr of target) tr.classList.add('current');
                target[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                updateNavUI();
            }

            function nextChange() {
                if (hunkRows.length === 0) return;
                gotoHunk(currentHunk === -1 ? 0 : currentHunk + 1);
            }

            function prevChange() {
                if (hunkRows.length === 0) return;
                gotoHunk(currentHunk === -1 ? hunkRows.length - 1 : currentHunk - 1);
            }

            function updateStats(rows) {
                let added = 0, removed = 0, changed = 0;
                for (const r of rows) {
                    if (r.type === 'added') added++;
                    else if (r.type === 'removed') removed++;
                    else if (r.type === 'changed') changed++;
                }
                clearNode(stats);
                const spanAdded = document.createElement('span');
                spanAdded.className = 'stat-added';
                spanAdded.textContent = '+' + added + ' added';
                const spanRemoved = document.createElement('span');
                spanRemoved.className = 'stat-removed';
                spanRemoved.textContent = '−' + removed + ' removed';
                const spanChanged = document.createElement('span');
                spanChanged.className = 'stat-changed';
                spanChanged.textContent = '~' + changed + ' changed';
                stats.appendChild(spanAdded);
                stats.appendChild(spanRemoved);
                stats.appendChild(spanChanged);
            }

            function captionText(filename, text) {
                const lineCount = text === '' ? 0 : (text.split('\n').length - (text.endsWith('\n') ? 1 : 0)) || 1;
                const parts = [];
                if (filename) parts.push(filename);
                parts.push(lineCount + (lineCount === 1 ? ' line' : ' lines'));
                return parts.join(' · ');
            }

            function updateCaptions() {
                leftCaption.textContent = captionText(filenames.left, leftInput.value);
                rightCaption.textContent = captionText(filenames.right, rightInput.value);
            }

            function compare() {
                const rows = buildRows(leftInput.value, rightInput.value);
                renderRows(rows);
                updateStats(rows);
                updateCaptions();
            }

            let debounceHandle = null;
            function scheduleCompare() {
                if (debounceHandle !== null) clearTimeout(debounceHandle);
                debounceHandle = setTimeout(compare, 250);
            }

            function readFile(file, side) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const text = typeof e.target.result === 'string' ? e.target.result : '';
                    if (side === 'left') {
                        leftInput.value = text;
                        filenames.left = file.name;
                    } else {
                        rightInput.value = text;
                        filenames.right = file.name;
                    }
                    compare();
                };
                reader.onerror = function () { alert('Error reading file.'); };
                reader.readAsText(file);
            }

            document.querySelectorAll('[data-load]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const side = btn.getAttribute('data-load');
                    (side === 'left' ? fileLeft : fileRight).click();
                });
            });

            document.querySelectorAll('[data-clear]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const side = btn.getAttribute('data-clear');
                    if (side === 'left') { leftInput.value = ''; filenames.left = ''; }
                    else { rightInput.value = ''; filenames.right = ''; }
                    compare();
                });
            });

            fileLeft.addEventListener('change', function (e) {
                const f = e.target.files[0];
                if (f) readFile(f, 'left');
                e.target.value = '';
            });
            fileRight.addEventListener('change', function (e) {
                const f = e.target.files[0];
                if (f) readFile(f, 'right');
                e.target.value = '';
            });

            function wireDnD(textarea, side) {
                textarea.addEventListener('dragover', function (e) {
                    e.preventDefault();
                    textarea.classList.add('dragging');
                });
                textarea.addEventListener('dragleave', function () {
                    textarea.classList.remove('dragging');
                });
                textarea.addEventListener('drop', function (e) {
                    textarea.classList.remove('dragging');
                    if (!e.dataTransfer || !e.dataTransfer.files || e.dataTransfer.files.length === 0) return;
                    e.preventDefault();
                    readFile(e.dataTransfer.files[0], side);
                });
            }
            wireDnD(leftInput, 'left');
            wireDnD(rightInput, 'right');

            leftInput.addEventListener('input', function () {
                if (filenames.left) filenames.left = '';
                scheduleCompare();
            });
            rightInput.addEventListener('input', function () {
                if (filenames.right) filenames.right = '';
                scheduleCompare();
            });

            document.getElementById('btn-compare').addEventListener('click', compare);

            document.getElementById('btn-swap').addEventListener('click', function () {
                const tmpVal = leftInput.value;
                leftInput.value = rightInput.value;
                rightInput.value = tmpVal;
                const tmpName = filenames.left;
                filenames.left = filenames.right;
                filenames.right = tmpName;
                compare();
            });

            document.getElementById('btn-clear-both').addEventListener('click', function () {
                leftInput.value = '';
                rightInput.value = '';
                filenames.left = '';
                filenames.right = '';
                compare();
            });

            btnPrevChange.addEventListener('click', prevChange);
            btnNextChange.addEventListener('click', nextChange);

            document.addEventListener('keydown', function (e) {
                if (!e.altKey || e.ctrlKey || e.metaKey || e.shiftKey) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); nextChange(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); prevChange(); }
            });

            showEmptyState('Paste or load text on both sides to see the diff.');
            updateStats([]);
            updateCaptions();
            updateNavUI();
        })();
    </script>
</body>
</html>
