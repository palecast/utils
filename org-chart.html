<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Chart Designer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #FAF8F5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #4A5D47;
            color: #FAF8F5;
            padding: 10px 20px;
            flex-shrink: 0;
        }

        header h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        header a.disclaimer-link { color: rgba(250,248,245,0.7); font-size: 0.75rem; text-decoration: none; }
        header a.disclaimer-link:hover { color: #FAF8F5; }
        header .privacy-note { margin: 0.25rem 0 0; font-size: 0.7rem; color: rgba(250,248,245,0.6); font-weight: 400; }

        .panel {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(74,93,71,0.12);
            flex-shrink: 0;
        }

        .panel-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: white;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6B5F54;
            white-space: nowrap;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-primary { background: #4A5D47; color: #FAF8F5; }
        .btn-primary:hover { background: #3D4E3B; }
        .btn-secondary { background: #e9ecef; color: #333; }
        .btn-secondary:hover { background: #dee2e6; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-small { padding: 4px 10px; font-size: 0.8rem; }

        select, input[type="file"] {
            padding: 6px 10px;
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }

        input[type="checkbox"] { margin-right: 4px; }

        .checkbox-label {
            font-size: 0.85rem;
            color: #6B5F54;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        /* Filter multi-select */
        .filter-container {
            position: relative;
        }

        .filter-values {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(58,47,40,0.08);
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            min-width: 180px;
            padding: 8px;
            display: none;
        }

        .filter-values.open { display: block; }

        .filter-values label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* File handling toolbar */
        .filename-indicator {
            font-size: 0.85rem;
            color: #6B5F54;
            font-style: italic;
            padding: 0 4px;
            white-space: nowrap;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .filename-indicator.has-file { font-style: normal; font-weight: 500; color: #3A2F28; }

        button:disabled { opacity: 0.45; cursor: not-allowed; }
        button:disabled:hover { background: #4A5D47; }

        /* AND label between filter rows */
        .filter-and-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6B5F54;
            text-align: center;
            padding: 2px 0;
            opacity: 0.6;
        }

        /* Tag chips on chart cards */
        .node-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 4px;
        }
        .node-tag {
            display: inline-block;
            background: rgba(74,93,71,0.12);
            color: #4A5D47;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Save As fallback dialog */
        #saveas-dialog {
            border: 1px solid rgba(74,93,71,0.18);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 12px 40px rgba(58,47,40,0.18);
            background: white;
            color: #3A2F28;
            font-family: inherit;
            min-width: 320px;
        }
        #saveas-dialog::backdrop { background: rgba(58,47,40,0.35); }
        #saveas-dialog h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #3A2F28; }
        #saveas-dialog .saveas-row { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        #saveas-dialog label { font-size: 0.8rem; font-weight: 600; color: #6B5F54; }
        #saveas-dialog input[type="text"] {
            padding: 8px 10px;
            border: 1px solid rgba(74,93,71,0.18);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            width: 100%;
        }
        #saveas-dialog fieldset {
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            gap: 14px;
        }
        #saveas-dialog fieldset legend { padding: 0 4px; font-size: 0.75rem; color: #6B5F54; font-weight: 600; }
        #saveas-dialog fieldset label { font-weight: 400; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        #saveas-dialog menu { display: flex; gap: 8px; justify-content: flex-end; padding: 0; margin-top: 16px; list-style: none; }

        /* Warning banner */
        .warning-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: none;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 2px solid rgba(74,93,71,0.12);
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #6B5F54;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            border-radius: 0;
        }

        .tab-btn.active {
            color: #4A5D47;
            border-bottom-color: #4A5D47;
        }

        .tab-content { display: none; padding: 16px 20px 16px; }
        .tab-content.active { display: block; }
        #tab-table.active { overflow: auto; flex: 1; min-height: 0; }
        #tab-chart.active { display: flex; gap: 0; flex: 1; min-height: 0; padding: 0; }
        #tab-pivot.active { display: flex; gap: 0; flex: 1; min-height: 0; padding: 0; }

        /* Status badges */
        .status-filled { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-vacant { background: #f8d7da; color: #721c24; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-pending-start { background: #d1ecf1; color: #0c5460; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-planned { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-on-hold { background: #ffecd2; color: #856404; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-sunsetting { background: #e8daef; color: #4a235a; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-removed { background: #e2e3e5; color: #383d41; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .status-earmarked { background: #cce5ff; color: #004085; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }

        /* Tabulator theme overrides */
        #tabulator-grid {
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
        }
        #tabulator-grid .tabulator-header {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            border-radius: 6px 6px 0 0;
        }
        #tabulator-grid .tabulator-col-title { font-weight: 600; color: #6B5F54; }
        #tabulator-grid .tabulator-row:hover .tabulator-cell { background: #f8f9fa; }
        #tabulator-grid .tabulator-row.tabulator-selected .tabulator-cell { background: #dbeafe; }
        #tabulator-grid .tabulator-row.tabulator-selected:hover .tabulator-cell { background: #bfdbfe; }
        .row-action-btn {
            padding: 2px 6px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.75rem;
            margin: 0 1px;
            background: #e9ecef;
            color: #333;
        }
        .row-action-btn:hover { background: #dee2e6; }

        .tabulator-cell.tabulator-cell-active {
            outline: 2px solid #4A5D47;
            outline-offset: -2px;
        }
        #tabulator-grid .tabulator-header .tabulator-col .tabulator-header-filter input,
        #tabulator-grid .tabulator-header .tabulator-col .tabulator-header-filter select {
            font-size: 0.8rem;
            padding: 4px 6px;
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 4px;
        }

        /* Chart */
        #chart-container {
            position: relative;
            overflow: auto;
            flex: 1;
            min-height: 0;
            text-align: center;
        }

        .node-card { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(58,47,40,0.08); }
        .node-title-bar { font-size: 0.8rem; font-weight: 600; color: white; padding: 6px 8px; word-wrap: break-word; }
        .node-body { font-size: 0.75rem; padding: 6px 8px; background: white; border: 1px solid rgba(74,93,71,0.12); border-top: none; border-radius: 0 0 6px 6px; }
        .node-incumbent { font-weight: 500; margin-bottom: 2px; }
        .node-status { margin: 2px 0; }
        .node-meta { color: #6B5F54; font-size: 0.7rem; margin-top: 3px; }

        /* Dabeng OrgChart v5 overrides — strip default chrome, tint connectors to sage palette */
        .orgchart { background-image: none !important; padding: 12px !important; }
        .orgchart .node { width: 220px; padding: 0; border: 1px dashed transparent; }
        .orgchart .node:hover, .orgchart .node.selected, .orgchart .node.focused,
        .orgchart ul li .node:hover, .orgchart ul li .node.selected {
            background-color: rgba(74,93,71,0.10) !important;
            transition: 0.25s;
        }
        /* Tint all connector lines/links from default red to sage */
        .orgchart .hierarchy::before,
        .orgchart .hierarchy.spouse:not(.couple)::after,
        .orgchart .couple::after,
        .orgchart .nodes.vertical .hierarchy::before,
        .orgchart .nodes.vertical .hierarchy::after { border-color: rgba(74,93,71,0.45) !important; }
        .orgchart .hierarchy:not(.couple) > .node:has(+ .nodes)::after,
        .orgchart > ul > li > ul li > .node:not(.outsider)::before,
        .orgchart .couple:has(> .nodes) > .node:first-child::after { background-color: rgba(74,93,71,0.45) !important; }
        .orgchart > ul > li > ul li > .node.outsider::before { border-right-color: rgba(74,93,71,0.45) !important; }
        /* Toggle button (collapse/expand) and edges in sage */
        .orgchart .node .toggleBtn::before { background-color: rgba(74,93,71,0.7) !important; }
        .orgchart .node .toggleBtn:hover::before { background-color: #4A5D47 !important; }
        .orgchart .node .edge::before { border-color: rgba(74,93,71,0.6) !important; }

        .reparent-panel {
            position: fixed; z-index: 1000; background: white; border-radius: 8px;
            box-shadow: 0 8px 30px rgba(58,47,40,0.12); padding: 16px; min-width: 240px;
        }
        .reparent-panel h4 { margin: 0 0 8px; font-size: 0.9rem; color: #333; }
        .reparent-panel select { width: 100%; padding: 6px 8px; border: 1px solid rgba(74,93,71,0.12); border-radius: 4px; font-size: 0.85rem; margin-bottom: 10px; }
        .reparent-panel .reparent-btns { display: flex; gap: 8px; justify-content: flex-end; }

        /* Legend (floating overlay on chart) */
        .chart-legend {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(58,47,40,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .chart-legend:empty { display: none; }
        .chart-legend .legend-title {
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6B5F54;
            margin-bottom: 2px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #6B5F54;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Tab bar */
        .tab-bar-container {
            background: white;
            border-bottom: 1px solid rgba(74,93,71,0.12);
            padding: 0 20px;
            flex-shrink: 0;
        }

        .chart-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: #F2F0EB;
            border-right: 1px solid rgba(74,93,71,0.12);
            transition: width 0.2s ease, padding 0.2s ease;
            overflow: hidden;
            position: relative;
        }
        .chart-sidebar.collapsed { width: 0; padding: 0; border-right: none; }
        .sidebar-content { padding: 12px; width: 240px; }

        .sidebar-toggle {
            position: absolute;
            right: -16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 25;
            width: 16px;
            height: 48px;
            background: #F2F0EB;
            border: 1px solid rgba(74,93,71,0.12);
            border-left: none;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #6B5F54;
            padding: 0;
        }
        .sidebar-toggle:hover { background: #E8E5DF; color: #3A2F28; }
        .chart-sidebar.collapsed .sidebar-toggle { right: -16px; }

        .design-surface {
            flex: 1;
            min-width: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #chart-container {
            flex: 1;
            min-width: 0;
        }

        /* Summary panel — fixed footer */
        .summary-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: white;
            border-top: 1px solid rgba(74,93,71,0.12);
            box-shadow: 0 -2px 8px rgba(58,47,40,0.08);
            display: none;
        }
        .summary-panel.visible { display: block; }
        .summary-toggle {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            cursor: pointer;
            background: #F2F0EB;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6B5F54;
            user-select: none;
        }
        .summary-toggle:hover { background: #E8E5DF; }
        .summary-content {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 12px 16px;
            transition: max-height 0.2s ease, padding 0.2s ease;
            overflow: hidden;
        }
        .summary-panel.collapsed .summary-content { max-height: 0; padding: 0 16px; }
        .summary-stat { display: flex; flex-direction: column; gap: 2px; }
        .summary-stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #999; font-weight: 600; }
        .summary-stat-value { font-size: 1rem; font-weight: 700; color: #333; }
        .summary-stat-sub { font-size: 0.7rem; color: #888; }
        .summary-pills { display: flex; gap: 6px; flex-wrap: wrap; }
        .summary-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
        .summary-pill.filled { background: #d4edda; color: #155724; }
        .summary-pill.vacant { background: #f8d7da; color: #721c24; }
        .summary-pill.pending-start { background: #d1ecf1; color: #0c5460; }
        .summary-pill.planned { background: #fff3cd; color: #856404; }
        .summary-pill.on-hold { background: #ffecd2; color: #856404; }
        .summary-pill.sunsetting { background: #e8daef; color: #4a235a; }
        .summary-pill.removed { background: #e2e3e5; color: #383d41; }
        .summary-pill.earmarked { background: #cce5ff; color: #004085; }

        /* Pivot table */
        .pivot-surface { flex: 1; min-width: 0; overflow: auto; padding: 16px; }
        .pivot-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .pivot-table th { background: #4A5D47; color: #FAF8F5; padding: 8px 12px; text-align: right; font-weight: 600; font-size: 0.8rem; white-space: nowrap; }
        .pivot-table th:first-child { text-align: left; }
        .pivot-table td { padding: 8px 12px; border-bottom: 1px solid #e9ecef; text-align: right; color: #333; }
        .pivot-table td:first-child { text-align: left; font-weight: 600; color: #6B5F54; }
        .pivot-table tbody tr:nth-child(even) { background: #F2F0EB; }
        .pivot-table tbody tr:hover { background: #E8E5DF; }
        .pivot-table tfoot td { font-weight: 700; border-top: 2px solid #4A5D47; background: #F2F0EB; }

        .control-section {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            margin-bottom: 8px;
            background: white;
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
        }
        .control-section:last-child { margin-bottom: 0; }

        .control-section-label {
            background: #E8E5DF;
            color: #6B5F54;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px 6px 0 0;
            justify-content: center;
        }

        .control-section-body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            padding: 8px;
        }

        .control-divider {
            width: 100%;
            height: 1px;
            background: rgba(74,93,71,0.12);
            flex-shrink: 0;
        }

        .control-section-body label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6B5F54;
        }

        .control-section-body button {
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 1rem;
            line-height: 28px;
            text-align: center;
        }

        .control-section-body span {
            font-size: 0.85rem;
            min-width: 30px;
            text-align: center;
        }

        .control-section-body select {
            font-size: 0.85rem;
            padding: 4px 8px;
            border: 1px solid rgba(74,93,71,0.12);
            border-radius: 6px;
            background: #fff;
            color: #333;
            width: 100%;
        }

        .control-section-body .control-group {
            flex-direction: column;
            align-items: stretch;
            gap: 4px;
        }

        .depth-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-section-body button.btn-small {
            width: auto;
            height: auto;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.1rem; }
            .controls { flex-direction: column; align-items: flex-start; }
            .panel { padding: 12px; }
            #tab-chart.active { flex-direction: column; }
            .chart-sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(74,93,71,0.12); }
            .chart-sidebar.collapsed { width: 100%; height: 0; border-bottom: none; }
            .sidebar-content { width: 100%; }
            .sidebar-toggle { display: none; }
            #tab-pivot.active { flex-direction: column; }
            .summary-content { flex-direction: column; gap: 8px; }
        }

        @media print {
            body { height: auto; overflow: visible; background: white; }
            header, .panel, .chart-sidebar, .sidebar-toggle, .summary-panel,
            .reparent-panel, .tab-bar, .pivot-container, .chart-legend { display: none !important; }
            .container, .panel-main, .design-surface { display: block !important; overflow: visible !important; height: auto !important; }
            #chart-container {
                width: auto !important; height: auto !important;
                overflow: visible !important;
            }
            #chart-container .orgchart {
                background: white !important;
                background-image: none !important;
            }
            .orgchart .node { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>&#127970; Org Chart Designer</h1>
            <p class="privacy-note">All data handling happens locally in your browser — nothing is ever sent to a server.</p>

    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/js/tabulator.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/orgchart@5/dist/css/jquery.orgchart.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/orgchart@5/dist/js/jquery.orgchart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>
        // --- Data model ---
        let roles = [];
        let activeTab = 'table';
        let nextId = 1;
        // Two filter slots, ANDed together. Each slot: { field, values:Set }.
        // Empty field or "all values selected" is inert.
        let filters = [
            { field: '', values: new Set() },
            { field: '', values: new Set() }
        ];
        // Tag filter — record matches if it has ANY of the selected tags.
        // ANDed with the two field filters above.
        let tagFilter = new Set();
        // File handling state
        let openFileName = '';            // display name e.g. "team.xlsx" — '' = no file
        let openFileFormat = '';          // 'csv' | 'xlsx' (xls upgrades to xlsx on save)
        let openFileHandle = null;        // FileSystemFileHandle when FSA path used
        let openFileIsTestData = false;   // test data has no real source — Save acts as Save As
        const HAS_FSA = typeof window.showOpenFilePicker === 'function'
                     && typeof window.showSaveFilePicker === 'function';
        let colorField = '';
        let colorMap = {};
        let maxDepth = 0; // 0 = show all
        let chartFields = { incumbent: true, status: true, department: true, location: false, gender: false, employmentType: false, workingPattern: false, cost: false, comments: false, headcount: false, cumulativeCost: false, hcFilled: false, hcVacant: false, hcPendingStart: false, hcPlanned: false, hcOnHold: false, hcSunsetting: false, hcRemoved: false, hcEarmarked: false, costFilled: false, costVacant: false, costPendingStart: false, costPlanned: false, costOnHold: false, costSunsetting: false, costRemoved: false, costEarmarked: false };
        let chartInstance = null;
        let tabulatorGrid = null;
        let isEditing = false;
        let chartLayout = 'top-hybrid';

        const LAYOUT_PRESETS = {
            'top-hybrid': { direction: 't2b', hybrid: true,  label: 'Top-down Hybrid' },
            'top':        { direction: 't2b', hybrid: false, label: 'Top-down' },
            'left':       { direction: 'l2r', hybrid: false, label: 'Left-to-right' },
        };

        const GRID_COLUMNS = [
            { field: 'roleId',          type: 'input' },
            { field: 'roleTitle',       type: 'input' },
            { field: 'status',          type: 'select' },
            { field: 'incumbentName',   type: 'input' },
            { field: 'managerRoleId',   type: 'select' },
            { field: 'department',      type: 'input' },
            { field: 'costToCompany',   type: 'input' },
            { field: 'location',        type: 'input' },
            { field: 'incumbentGender', type: 'select' },
            { field: 'employmentType',  type: 'select' },
            { field: 'workingPattern',  type: 'select' },
            { field: 'comments',        type: 'input' },
        ];

        const STATUS_COLORS = { filled: '#27ae60', vacant: '#e74c3c', 'pending start': '#17a2b8', planned: '#f39c12', 'on hold': '#e67e22', sunsetting: '#9b59b6', removed: '#95a5a6', earmarked: '#3498db' };
        const PALETTE = ['#27ae60','#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#2c3e50','#d35400','#c0392b'];

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function generateRoleId() {
            while (roles.some(r => r.roleId === 'R' + nextId)) nextId++;
            return 'R' + nextId++;
        }

        // --- CRUD ---
        function addRole() {
            roles.push({
                roleId: generateRoleId(),
                roleTitle: '',
                status: 'planned',
                incumbentName: '',
                managerRoleId: '',
                department: '',
                costToCompany: 0,
                location: '',
                incumbentGender: '',
                employmentType: 'Permanent',
                workingPattern: 'Full-time',
                comments: '',
                tags: []
            });
            render();
        }

        function deleteRole(roleId) {
            const role = roles.find(r => r.roleId === roleId);
            if (!role) return;
            const parentManager = role.managerRoleId;
            roles.forEach(r => {
                if (r.managerRoleId === roleId) r.managerRoleId = parentManager;
            });
            roles = roles.filter(r => r.roleId !== roleId);
            render();
        }

        function updateRoleField(roleId, field, value) {
            const role = roles.find(r => r.roleId === roleId);
            if (!role) return;

            if (field === 'roleId') {
                const oldId = role.roleId;
                role.roleId = value;
                roles.forEach(r => {
                    if (r.managerRoleId === oldId) r.managerRoleId = value;
                });
            } else if (field === 'costToCompany') {
                role[field] = parseFloat(value) || 0;
            } else {
                role[field] = value;
            }

            if (field === 'managerRoleId' && value) {
                const manager = roles.find(r => r.roleId === value);
                if (manager && manager.department && !role.department) {
                    role.department = manager.department;
                    renderTable();
                }
            }

            validateRoles();
            if (activeTab === 'chart') renderChart();
        }

        // --- Validation ---
        function validateRoles() {
            const warnings = [];
            const ids = roles.map(r => r.roleId);
            const dupes = ids.filter((id, i) => id && ids.indexOf(id) !== i);
            if (dupes.length) warnings.push('Duplicate Role IDs: ' + [...new Set(dupes)].join(', '));

            for (const role of roles) {
                if (!role.managerRoleId) continue;
                const visited = new Set();
                let current = role;
                while (current && current.managerRoleId) {
                    if (visited.has(current.roleId)) {
                        warnings.push('Circular reference detected involving: ' + current.roleId);
                        break;
                    }
                    visited.add(current.roleId);
                    current = roles.find(r => r.roleId === current.managerRoleId);
                }
            }

            const banner = document.getElementById('warning-banner');
            if (warnings.length) {
                banner.textContent = warnings.join(' | ');
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }
        }

        // --- Table rendering ---
        function renderTable() {
            if (!tabulatorGrid) {
                tabulatorGrid = new Tabulator('#tabulator-grid', {
                    data: roles.slice(),
                    layout: 'fitColumns',
                    movableRows: false,
                    selectable: 1,
                    placeholder: 'No roles yet — click + Add Row to start, or import a file.',
                    columns: [
                        { title: 'Role ID', field: 'roleId', editor: 'input', width: 90, headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        { title: 'Title', field: 'roleTitle', editor: 'input', headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        {
                            title: 'Status', field: 'status', editor: 'list',
                            editorParams: { values: ['filled', 'vacant', 'pending start', 'planned', 'on hold', 'sunsetting', 'removed', 'earmarked'] },
                            width: 110,
                            headerFilter: 'list', headerFilterParams: { values: { '': 'All', filled: 'Filled', vacant: 'Vacant', 'pending start': 'Pending Start', planned: 'Planned', 'on hold': 'On Hold', sunsetting: 'Sunsetting', removed: 'Removed', earmarked: 'Earmarked' } }
                        },
                        { title: 'Incumbent', field: 'incumbentName', editor: 'input', headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        {
                            title: 'Manager', field: 'managerRoleId', editor: 'list',
                            editorParams: function(cell) {
                                const roleId = cell.getRow().getData().roleId;
                                const opts = [{ label: '(None - Root)', value: '' }];
                                roles.forEach(r => {
                                    if (r.roleId !== roleId) opts.push({ label: r.roleId + (r.roleTitle ? ' - ' + r.roleTitle : ''), value: r.roleId });
                                });
                                return { values: opts };
                            },
                            width: 120,
                            headerFilter: 'input', headerFilterPlaceholder: 'Filter...'
                        },
                        { title: 'Department', field: 'department', editor: 'input', headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        { title: 'Cost', field: 'costToCompany', editor: 'number', editorParams: { min: 0 }, width: 90, headerFilter: 'number', headerFilterPlaceholder: 'Min...', headerFilterFunc: '>=' },
                        { title: 'Location', field: 'location', editor: 'input', headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        {
                            title: 'Gender', field: 'incumbentGender', editor: 'list',
                            editorParams: { values: [{ label: '-', value: '' }, 'Male', 'Female', 'Other'] },
                            width: 85,
                            headerFilter: 'list', headerFilterParams: { values: { '': 'All', '-': '-', Male: 'Male', Female: 'Female', Other: 'Other' } }
                        },
                        {
                            title: 'Employment Type', field: 'employmentType', editor: 'list',
                            editorParams: { values: ['Permanent', 'Intern', 'Secondment', 'Fixed-term', 'Contractor', 'Temporary/Agency', 'Apprentice/Graduate'] },
                            width: 140,
                            headerFilter: 'list', headerFilterParams: { values: { '': 'All', Permanent: 'Permanent', Intern: 'Intern', Secondment: 'Secondment', 'Fixed-term': 'Fixed-term', Contractor: 'Contractor', 'Temporary/Agency': 'Temporary/Agency', 'Apprentice/Graduate': 'Apprentice/Graduate' } }
                        },
                        {
                            title: 'Working Pattern', field: 'workingPattern', editor: 'list',
                            editorParams: { values: ['Full-time', 'Part-time'] },
                            width: 120,
                            headerFilter: 'list', headerFilterParams: { values: { '': 'All', 'Full-time': 'Full-time', 'Part-time': 'Part-time' } }
                        },
                        { title: 'Comments', field: 'comments', editor: 'input', headerFilter: 'input', headerFilterPlaceholder: 'Filter...' },
                        {
                            title: 'Tags', field: 'tags',
                            editor: function(cell, onRendered, success, cancel) {
                                const input = document.createElement('input');
                                input.type = 'text';
                                input.style.cssText = 'width:100%;padding:4px;box-sizing:border-box;';
                                input.value = tagsToString(cell.getValue());
                                onRendered(function() { input.focus(); input.select(); });
                                input.addEventListener('blur', function() { success(parseTagString(input.value)); });
                                input.addEventListener('keydown', function(e) {
                                    if (e.key === 'Enter') success(parseTagString(input.value));
                                    if (e.key === 'Escape') cancel();
                                });
                                return input;
                            },
                            headerFilter: 'input', headerFilterPlaceholder: 'Filter tags...',
                            formatter: function(cell) { return escapeHtml(tagsToString(cell.getValue())); },
                            mutator: function(val) { return Array.isArray(val) ? val : parseTagString(val); },
                            headerFilterFunc: function(term, cellVal) {
                                if (!term) return true;
                                const arr = Array.isArray(cellVal) ? cellVal : parseTagString(cellVal);
                                const t = String(term).toLowerCase();
                                return arr.some(tag => String(tag).toLowerCase().includes(t));
                            }
                        },
                        {
                            title: '', field: '_actions', width: 120, headerSort: false, editable: false,
                            formatter: function() {
                                return '<button class="row-action-btn" data-action="addChild" title="Add Direct Report">+child</button>'
                                    + '<button class="row-action-btn" data-action="duplicate" title="Duplicate">&#10697;</button>'
                                    + '<button class="row-action-btn" data-action="delete" title="Delete">&#10005;</button>';
                            },
                            cellClick: function(e, cell) {
                                const action = e.target.dataset.action;
                                if (!action) return;
                                const roleId = cell.getRow().getData().roleId;
                                if (action === 'addChild') addDirectReportById(roleId);
                                else if (action === 'duplicate') duplicateRowById(roleId);
                                else if (action === 'delete') deleteRole(roleId);
                            }
                        }
                    ],
                    cellEdited: function(cell) {
                        const field = cell.getField();
                        if (field === '_actions') return;
                        const rowData = cell.getRow().getData();
                        const newValue = cell.getValue();
                        const roleId = field === 'roleId' ? cell.getOldValue() : rowData.roleId;
                        updateRoleField(roleId, field, newValue);
                        if (field === 'roleId' || field === 'managerRoleId' || field === 'roleTitle') {
                            tabulatorGrid.replaceData(roles.slice());
                        }
                        if (field === 'tags') {
                            // Drop tag-filter selections that no longer exist; refresh dropdown.
                            const live = new Set(getAllTags());
                            [...tagFilter].forEach(t => { if (!live.has(t)) tagFilter.delete(t); });
                            syncFilterUI();
                        }
                        if (activeTab === 'chart') renderChart();
                    }
                });

                tabulatorGrid.on('cellEditing', function() { isEditing = true; });
                tabulatorGrid.on('cellEditCancelled', function() { isEditing = false; });
                tabulatorGrid.on('cellEdited', function() { isEditing = false; });
                tabulatorGrid.on('cellClick', function(e, cell) {
                    if (cell.getField() === '_actions') return;
                    document.querySelectorAll('.tabulator-cell.tabulator-cell-active').forEach(el => el.classList.remove('tabulator-cell-active'));
                    cell.getElement().classList.add('tabulator-cell-active');
                    cell.getRow().select();
                });

                // Excel-like keyboard navigation
                document.getElementById('tabulator-grid').addEventListener('keydown', function(e) {
                    if (isEditing) {
                        // When editing a list cell, pressing a letter selects the first matching option
                        if (e.key.length === 1 && /[a-z]/i.test(e.key)) {
                            const activeEl = document.activeElement;
                            const listDropdown = document.querySelector('.tabulator-edit-list');
                            if (listDropdown) {
                                const items = listDropdown.querySelectorAll('.tabulator-edit-list-item');
                                const letter = e.key.toLowerCase();
                                for (const item of items) {
                                    if (item.textContent.trim().toLowerCase().startsWith(letter)) {
                                        item.click();
                                        return;
                                    }
                                }
                            }
                        }
                        return;
                    }

                    const arrows = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                    if (!arrows.includes(e.key) && e.key !== 'Enter') return;

                    e.preventDefault();
                    const selectedRows = tabulatorGrid.getSelectedRows();
                    if (!selectedRows.length) return;

                    const row = selectedRows[0];
                    const allRows = tabulatorGrid.getRows();
                    const allCols = tabulatorGrid.getColumns().filter(c => c.getField() && c.getField() !== '_actions');
                    const rowIdx = allRows.indexOf(row);

                    // Find currently focused cell column, default to first
                    const focusedCell = document.querySelector('.tabulator-cell.tabulator-cell-active');
                    let colIdx = 0;
                    if (focusedCell) {
                        const focusedField = focusedCell.getAttribute('tabulator-field');
                        const idx = allCols.findIndex(c => c.getField() === focusedField);
                        if (idx >= 0) colIdx = idx;
                    }

                    let targetRow = row;
                    let targetColIdx = colIdx;

                    if (e.key === 'ArrowUp' && rowIdx > 0) {
                        targetRow = allRows[rowIdx - 1];
                    } else if (e.key === 'ArrowDown' && rowIdx < allRows.length - 1) {
                        targetRow = allRows[rowIdx + 1];
                    } else if (e.key === 'ArrowLeft' && colIdx > 0) {
                        targetColIdx = colIdx - 1;
                    } else if (e.key === 'ArrowRight' && colIdx < allCols.length - 1) {
                        targetColIdx = colIdx + 1;
                    } else if (e.key === 'Enter') {
                        const cell = row.getCell(allCols[colIdx].getField());
                        if (cell) cell.edit();
                        return;
                    }

                    if (targetRow !== row) {
                        targetRow.select();
                    }
                    const targetCell = targetRow.getCell(allCols[targetColIdx].getField());
                    if (targetCell) {
                        const cellEl = targetCell.getElement();
                        // Remove active from previous, add to new
                        document.querySelectorAll('.tabulator-cell.tabulator-cell-active').forEach(el => el.classList.remove('tabulator-cell-active'));
                        cellEl.classList.add('tabulator-cell-active');
                        cellEl.scrollIntoView({ block: 'nearest', inline: 'nearest' });
                    }
                });
            } else {
                tabulatorGrid.replaceData(roles.slice());
            }
        }

        // --- Row actions (by roleId) ---
        function addDirectReportById(roleId) {
            const idx = roles.findIndex(r => r.roleId === roleId);
            if (idx < 0) return;

        function duplicateRowById(roleId) {

        // --- Tree building ---
        function buildTree(rolesArray) {
            const map = {};
            rolesArray.forEach(r => {
                map[r.roleId] = { ...r, children: [] };
            });
            const roots = [];
            rolesArray.forEach(r => {
                if (r.managerRoleId && map[r.managerRoleId]) {
                    map[r.managerRoleId].children.push(map[r.roleId]);
                } else {
                    roots.push(map[r.roleId]);
                }
            });

            if (roots.length === 0) return null;
            if (roots.length === 1) return roots[0];
            return { roleId: '_root', roleTitle: 'Organization', status: '', incumbentName: '', department: '', costToCompany: 0, location: '', incumbentGender: '', comments: '', children: roots };
        }

        function computeCumulativeFields(node) {
            if (!node) return;
            const statuses = ['filled', 'vacant', 'pending start', 'planned', 'on hold', 'sunsetting', 'removed', 'earmarked'];
            let headcount = (node.status === 'filled' || node.status === 'pending start' || node.status === 'planned' || node.status === 'earmarked') ? 1 : 0;
            let cost = node.costToCompany || 0;
            const perStatus = {};
            statuses.forEach(s => {
                perStatus['hc_' + s] = node.status === s ? 1 : 0;
                perStatus['cost_' + s] = node.status === s ? (node.costToCompany || 0) : 0;
            });
            (node.children || []).forEach(child => {
                computeCumulativeFields(child);
                headcount += child.cumulativeHeadcount || 0;
                cost += child.cumulativeCost || 0;
                statuses.forEach(s => {
                    perStatus['hc_' + s] += child['hc_' + s] || 0;
                    perStatus['cost_' + s] += child['cost_' + s] || 0;
                });
            });
            node.cumulativeHeadcount = headcount;
            node.cumulativeCost = cost;
            Object.assign(node, perStatus);
        }

        // --- Filtering ---
        function getFilteredRoles() {
            // A field-filter slot is "active" only if a field is chosen and the user
            // has selected a strict subset of its possible values. All-selected = no constraint.
            const active = filters.filter(f => {
                if (!f.field || f.values.size === 0) return false;
                return f.values.size < getUniqueValues(f.field).length;
            });
            const tagsActive = tagFilter.size > 0;
            // A field with zero values selected explicitly excludes everything.
            const hardEmpty = filters.some(f => f.field && f.values.size === 0);

            if (!active.length && !tagsActive && !hardEmpty) return roles.slice();

            const kept = new Set();
            const removedMap = {};
            roles.forEach(r => {
                const passField = !hardEmpty && active.every(f => f.values.has(String(r[f.field] || '')));
                const passTags  = !tagsActive || (Array.isArray(r.tags) && r.tags.some(t => tagFilter.has(t)));
                if (passField && passTags) {
                    kept.add(r.roleId);
                } else {
                    removedMap[r.roleId] = r.managerRoleId;
                }
            });

            const result = roles.filter(r => kept.has(r.roleId)).map(r => ({ ...r }));
            result.forEach(r => {
                let mgr = r.managerRoleId;
                while (mgr && removedMap.hasOwnProperty(mgr)) {
                    mgr = removedMap[mgr];
                }
                r.managerRoleId = mgr;
            });
            return result;
        }

        function getUniqueValues(field) {
            const vals = new Set();
            roles.forEach(r => vals.add(String(r[field] || '')));
            return [...vals].sort();
        }

        function getAllTags() {
            const vals = new Set();
            roles.forEach(r => (r.tags || []).forEach(t => { if (t) vals.add(t); }));
            return [...vals].sort();
        }

        function changeDepth(delta) {
            const filtered = getFilteredRoles();
            const tree = buildTree(filtered);
            const actualMax = tree ? getMaxTreeDepth(tree) : 1;

            if (delta < 0) {
                if (maxDepth === 0) maxDepth = actualMax;
                else maxDepth = Math.max(1, maxDepth - 1);
            } else {
                if (maxDepth === 0) return;
                maxDepth = maxDepth + 1;
                if (maxDepth >= actualMax) maxDepth = 0;
            }

            document.getElementById('depth-display').textContent = maxDepth === 0 ? 'All' : maxDepth;
            if (activeTab === 'chart') renderChart();
        }

        function getMaxTreeDepth(node, d) {
            d = d || 1;
            if (!node.children || !node.children.length) return d;
            let max = d;
            node.children.forEach(c => {
                max = Math.max(max, getMaxTreeDepth(c, d + 1));
            });
            return max;
        }

        // --- Chart data helpers ---
        function toFlatChartData(filteredRoles) {
            const tree = buildTree(filteredRoles);
            if (!tree) return [];
            computeCumulativeFields(tree);

            // Build a lookup from tree nodes to get cumulative values
            const perStatusKeys = ['hc_filled','hc_vacant','hc_pending start','hc_planned','hc_on hold','hc_sunsetting','hc_removed','hc_earmarked','cost_filled','cost_vacant','cost_pending start','cost_planned','cost_on hold','cost_sunsetting','cost_removed','cost_earmarked'];
            const cumulMap = {};
            function walkTree(node) {
                const entry = { cumulativeHeadcount: node.cumulativeHeadcount, cumulativeCost: node.cumulativeCost };
                perStatusKeys.forEach(k => { entry[k] = node[k] || 0; });
                cumulMap[node.roleId] = entry;
                (node.children || []).forEach(walkTree);
            }
            walkTree(tree);

            const flat = [];
            const hasVirtualRoot = tree.roleId === '_root';

            if (hasVirtualRoot) {
                const rootEntry = {
                    id: '_root',
                    parentId: '',
                    roleId: '_root',
                    roleTitle: 'Organization',
                    status: '',
                    incumbentName: '',
                    department: '',
                    costToCompany: 0,
                    location: '',
                    incumbentGender: '',
                    employmentType: '',
                    workingPattern: '',
                    comments: '',
                    cumulativeHeadcount: tree.cumulativeHeadcount,
                    cumulativeCost: tree.cumulativeCost
                };
                perStatusKeys.forEach(k => { rootEntry[k] = tree[k] || 0; });
                flat.push(rootEntry);
            }

            filteredRoles.forEach(r => {
                let parentId = r.managerRoleId || '';
                // If this role's manager is not in the filtered set, attach to root
                if (parentId && !filteredRoles.some(fr => fr.roleId === parentId)) {
                    parentId = hasVirtualRoot ? '_root' : '';
                }
                // If no parent and virtual root exists, attach to it
                if (!parentId && hasVirtualRoot) {
                    parentId = '_root';
                }
                const cumul = cumulMap[r.roleId] || {};
                const entry = {
                    id: r.roleId,
                    parentId: parentId,
                    roleId: r.roleId,
                    roleTitle: r.roleTitle,
                    status: r.status,
                    incumbentName: r.incumbentName,
                    department: r.department,
                    costToCompany: r.costToCompany,
                    location: r.location,
                    incumbentGender: r.incumbentGender,
                    employmentType: r.employmentType,
                    workingPattern: r.workingPattern,
                    comments: r.comments,
                    tags: Array.isArray(r.tags) ? r.tags.slice() : [],
                    cumulativeHeadcount: cumul.cumulativeHeadcount || 0,
                    cumulativeCost: cumul.cumulativeCost || 0
                };
                perStatusKeys.forEach(k => { entry[k] = cumul[k] || 0; });
                flat.push(entry);
            });

            return flat;
        }

        function toNestedChartData(filteredRoles) {
            const flat = toFlatChartData(filteredRoles);
            if (!flat.length) return null;
            const byId = {};
            flat.forEach(e => { byId[e.id] = Object.assign({}, e, { children: [] }); });
            let root = null;
            flat.forEach(e => {
                const node = byId[e.id];
                if (e.parentId && byId[e.parentId]) byId[e.parentId].children.push(node);
                else root = node;
            });
            return root;
        }

        // A parent renders its children vertically when none of those children have
        // visible grandchildren under the current depth limit. A child counts as a
        // "visual leaf" if it has no real children OR if its own children fall
        // beyond maxLevel. Pass maxLevel = 0 to mean "no limit" (treat real leaves only).
        function applyLeafParentHybrid(node, currentLevel, maxLevel) {
            if (!node.children || !node.children.length) return;
            currentLevel = currentLevel || 1;
            delete node.hybrid;
            const allVisualLeaves = node.children.every(function(c) {
                if (!c.children || !c.children.length) return true;
                if (maxLevel && (currentLevel + 1) >= maxLevel) return true;
                return false;
            });
            if (allVisualLeaves) node.hybrid = true;
            node.children.forEach(function(c) { applyLeafParentHybrid(c, currentLevel + 1, maxLevel); });
        }

        function computeNodeHeight() {
            let lines = 1; // title bar always
            Object.keys(chartFields).forEach(f => { if (chartFields[f]) lines++; });

            const metaFields = [
                { key: 'hcFilled', prop: 'hc_filled', label: 'HC Filled' },
                { key: 'hcVacant', prop: 'hc_vacant', label: 'HC Vacant' },
                { key: 'hcPendingStart', prop: 'hc_pending start', label: 'HC Pending Start' },
                { key: 'hcPlanned', prop: 'hc_planned', label: 'HC Planned' },
                { key: 'hcOnHold', prop: 'hc_on hold', label: 'HC On Hold' },
                { key: 'hcSunsetting', prop: 'hc_sunsetting', label: 'HC Sunsetting' },
                { key: 'hcRemoved', prop: 'hc_removed', label: 'HC Removed' },

        // --- Chart rendering ---
        function renderChart() {
            const container = document.getElementById('chart-container');
            while (container.firstChild) container.removeChild(container.firstChild);
            const legendDiv = document.createElement('div');
            legendDiv.className = 'chart-legend';
            legendDiv.id = 'legend';

            if (!filtered.length) {
                container.appendChild(emptyMsg('No roles to display. Add data in the Table tab.'));

            }

            const tree = toNestedChartData(filtered);
            if (!tree) {
                container.appendChild(emptyMsg('Unable to build tree. Check your data.'));
                updateSummaryPanel(filtered);
                return;
            }

            const preset = LAYOUT_PRESETS[chartLayout] || LAYOUT_PRESETS['top-hybrid'];
            const hasVirtualRoot = tree.roleId === '_root';
            const maxLevel = maxDepth === 0 ? 0 : maxDepth + (hasVirtualRoot ? 1 : 0);

            if (preset.hybrid) applyLeafParentHybrid(tree, 1, maxLevel);

            chartInstance = $('#chart-container').orgchart({
                data: tree,
                direction: preset.direction,
                pan: true,
                zoom: true,
                visibleLevel: 999,
                nodeContent: 'roleTitle',
                nodeTemplate: function(data) { return buildNodeContentHtml(data); },
                createNode: function($node, data) {
                    $node.on('click', function(e) {
                        if ($(e.target).closest('.edge, .toggleBtn, .topEdge, .rightEdge, .bottomEdge, .leftEdge').length) return;
                        if (data.roleId && data.roleId !== '_root') {
                            showReparentPanel(data.roleId, e);

            });

            if (maxLevel > 0) applyDepthLimit(container, maxLevel);

            renderLegend();
            updateSummaryPanel(filtered);

        // Manually apply collapse classes at a given depth. dabeng v5's built-in
        // visibleLevel option leaves connector artefacts in hybrid mode (it slides
        // descendants out via opacity but never hides the .nodes container or marks
        // the parent .isChildrenCollapsed). Replicating what hideChildren() does on
        // a manual toggle gives clean collapse with full connector suppression.
        function applyDepthLimit(container, maxLevel) {
            const roots = container.querySelectorAll('.orgchart > ul.nodes > li.hierarchy');
            roots.forEach(function(r) { collapseAtDepth(r, 1, maxLevel); });
        }

        function collapseAtDepth(hierarchy, level, maxLevel) {
            const childUl = hierarchy.querySelector(':scope > ul.nodes');
            if (!childUl) return;
            if (level >= maxLevel) {
                hierarchy.classList.add('isChildrenCollapsed');
                childUl.classList.add('hidden');
                childUl.querySelectorAll('.node').forEach(function(n) { n.classList.add('slide-up'); });
                if (!childUl.classList.contains('vertical')) {
                    childUl.querySelectorAll('.hierarchy').forEach(function(h) { h.classList.add('isCollapsedDescendant'); });
                }
                return;
            }
            childUl.querySelectorAll(':scope > li.hierarchy').forEach(function(child) {
                collapseAtDepth(child, level + 1, maxLevel);
            });
        }

        function updateSummaryPanel(filtered) {

            const total = filtered.length;
            const totalCost = filtered.reduce(function(s, r) { return s + (r.costToCompany || 0); }, 0);
            const statusCounts = { filled: 0, vacant: 0, 'pending start': 0, planned: 0, 'on hold': 0, sunsetting: 0, removed: 0, earmarked: 0 };
            const statusCosts = { filled: 0, vacant: 0, 'pending start': 0, planned: 0, 'on hold': 0, sunsetting: 0, removed: 0, earmarked: 0 };
            filtered.forEach(function(r) {
                const s = r.status || 'planned';
                statusCounts[s] = (statusCounts[s] || 0) + 1;
                statusCosts[s] = (statusCosts[s] || 0) + (r.costToCompany || 0);
            });

            // Span of control
            const reportCounts = {};
            filtered.forEach(function(r) {
                if (r.managerRoleId) {
                    reportCounts[r.managerRoleId] = (reportCounts[r.managerRoleId] || 0) + 1;
                }
            });
            const spans = Object.values(reportCounts);
            const maxSpan = spans.length ? Math.max.apply(null, spans) : 0;
            const avgSpan = spans.length ? (spans.reduce(function(a, b) { return a + b; }, 0) / spans.length).toFixed(1) : '0';

            function fmtCost(v) {
                if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
                if (v >= 1000) return (v / 1000).toFixed(0) + 'K';
                return v.toFixed(0);
            }

            var html = '';
            html += '<div class="summary-stat"><span class="summary-stat-label">Total Roles</span><span class="summary-stat-value">' + total + '</span></div>';
            html += '<div class="summary-stat"><span class="summary-stat-label">Total Cost</span><span class="summary-stat-value">' + fmtCost(totalCost) + '</span></div>';
            html += '<div class="summary-stat"><span class="summary-stat-label">Status</span><div class="summary-pills">';
            ['filled', 'vacant', 'pending start', 'planned', 'on hold', 'sunsetting', 'removed', 'earmarked'].forEach(function(s) {
                if (statusCounts[s]) {
                    html += '<span class="summary-pill ' + s.replace(/\s+/g, '-') + '">' + statusCounts[s] + ' ' + s + '</span>';

            html += '</div></div>';
            html += '<div class="summary-stat"><span class="summary-stat-label">Max Span</span><span class="summary-stat-value">' + maxSpan + '</span></div>';
            html += '<div class="summary-stat"><span class="summary-stat-label">Avg Span</span><span class="summary-stat-value">' + avgSpan + '</span></div>';

        function renderPivotTable() {
            const filtered = getFilteredRoles();
            const container = document.getElementById('pivot-table-container');

                container.innerHTML = '<p style="padding:40px;color:#888">No data. Import or add rows in the Table tab.</p>';

            const isCost = valueField === 'cost';

            const rowVals = [...new Set(filtered.map(r => String(r[rowField] || '') || '(blank)'))].sort();
            const colVals = [...new Set(filtered.map(r => String(r[colField] || '') || '(blank)'))].sort();

            const agg = {};
            filtered.forEach(r => {
                const rv = String(r[rowField] || '') || '(blank)';
                const cv = String(r[colField] || '') || '(blank)';
                const key = rv + '|' + cv;
                agg[key] = (agg[key] || 0) + (isCost ? (r.costToCompany || 0) : 1);
            });

            function fmt(v) { return isCost ? Number(v).toLocaleString() : v; }

            let html = '<table class="pivot-table"><thead><tr>';
            html += '<th>' + escapeHtml(fieldLabel(rowField)) + ' \\ ' + escapeHtml(fieldLabel(colField)) + '</th>';
            colVals.forEach(c => { html += '<th>' + escapeHtml(c) + '</th>'; });
            html += '<th>Total</th></tr></thead><tbody>';

            let colTotals = colVals.map(() => 0);
            let grandTotal = 0;

            rowVals.forEach(rv => {
                html += '<tr><td>' + escapeHtml(rv) + '</td>';
                let rowTotal = 0;
                colVals.forEach((cv, ci) => {
                    const v = agg[rv + '|' + cv] || 0;
                    rowTotal += v;
                    colTotals[ci] += v;
                    html += '<td>' + fmt(v) + '</td>';
                });
                grandTotal += rowTotal;
                html += '<td>' + fmt(rowTotal) + '</td></tr>';
            });

            html += '</tbody><tfoot><tr><td>Total</td>';
            colTotals.forEach(ct => { html += '<td>' + fmt(ct) + '</td>'; });

            container.innerHTML = html;

        // --- Import ---
        const HEADER_ALIASES = {
            'roleid': 'roleId', 'role id': 'roleId', 'role_id': 'roleId', 'id': 'roleId',
            'roletitle': 'roleTitle', 'role title': 'roleTitle', 'role_title': 'roleTitle', 'title': 'roleTitle', 'role': 'roleTitle',
            'status': 'status',
            'incumbentname': 'incumbentName', 'incumbent name': 'incumbentName', 'incumbent_name': 'incumbentName', 'incumbent': 'incumbentName', 'name': 'incumbentName',
            'managerroleid': 'managerRoleId', 'manager role id': 'managerRoleId', 'manager_role_id': 'managerRoleId', 'manager': 'managerRoleId', 'manager id': 'managerRoleId', 'reports to': 'managerRoleId',
            'department': 'department', 'dept': 'department',
            'costtocompany': 'costToCompany', 'cost to company': 'costToCompany', 'cost_to_company': 'costToCompany', 'cost': 'costToCompany', 'ctc': 'costToCompany', 'salary': 'costToCompany',
            'location': 'location', 'office': 'location',
            'incumbentgender': 'incumbentGender', 'incumbent gender': 'incumbentGender', 'incumbent_gender': 'incumbentGender', 'gender': 'incumbentGender',
            'employmenttype': 'employmentType', 'employment type': 'employmentType', 'employment_type': 'employmentType', 'emp type': 'employmentType', 'contract type': 'employmentType',
            'workingpattern': 'workingPattern', 'working pattern': 'workingPattern', 'working_pattern': 'workingPattern', 'work pattern': 'workingPattern', 'fte': 'workingPattern',
            'comments': 'comments', 'notes': 'comments', 'comment': 'comments',
            'tags': 'tags', 'tag': 'tags', 'keywords': 'tags', 'labels': 'tags'
        };

        function mapHeaders(rawHeaders) {
            const mapping = {};
            rawHeaders.forEach(h => {
                const key = String(h).trim().toLowerCase();
                if (HEADER_ALIASES[key]) mapping[h] = HEADER_ALIASES[key];
            });
            return mapping;
        }

        function processImportData(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: '' });

            if (!jsonData.length) {
                alert('No data found in the file.');
                return;
            }

            const headerMap = mapHeaders(Object.keys(jsonData[0]));
            roles = jsonData.map((row, i) => {
                const role = {
                    roleId: '', roleTitle: '', status: 'planned', incumbentName: '',
                    managerRoleId: '', department: '', costToCompany: 0,
                    location: '', incumbentGender: '', employmentType: 'Permanent',
                    workingPattern: 'Full-time', comments: '', tags: []
                };
                Object.entries(row).forEach(([col, val]) => {
                    const field = headerMap[col];
                    if (field) {
                        if (field === 'costToCompany') {
                            role[field] = parseFloat(val) || 0;
                        } else if (field === 'status') {
                            const s = String(val).toLowerCase().trim();
                            role[field] = ['filled','vacant','pending start','planned','on hold','sunsetting','removed','earmarked'].includes(s) ? s : 'planned';
                        } else if (field === 'tags') {
                            role[field] = parseTagString(val);
                        } else {
                            role[field] = String(val);
                        }
                    }
                });
                if (!role.roleId) role.roleId = 'R' + (i + 1);
                return role;
            });

            nextId = roles.reduce(function(max, r) {
                var m = r.roleId.match(/^R(\d+)$/);
                return m ? Math.max(max, parseInt(m[1]) + 1) : max;
            }, roles.length + 1);
            validateRoles();
            render();
        }

        // Fallback (non-FSA) Open path. The hidden <input type="file"> is triggered
        // by openFile() when the File System Access API isn't available.
        function importFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    processImportData(e.target.result);
                    // Remember the source so subsequent Save can fall back to a download
                    // with the original filename and format.
                    setOpenFile({ name: file.name, format: detectFormat(file.name), handle: null, isTestData: false });
                } catch (err) {
                    alert('Error importing file: ' + err.message);
                }
            };
            reader.onerror = function() { alert('Error reading file.'); };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        function loadTestData() {
            fetch('test-data/org-chart-test-data.csv')
                .then(function(response) {
                    if (!response.ok) throw new Error('Could not load test data (HTTP ' + response.status + ')');
                    return response.arrayBuffer();
                })
                .then(function(arrayBuffer) {
                    processImportData(arrayBuffer);
                    setOpenFile({ name: 'test data', format: 'csv', handle: null, isTestData: true });
                })
                .catch(function(err) {
