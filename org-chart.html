                });
        }

        // --- File handling (Open / Save / Save As) ---
        function detectFormat(name) {
            const m = String(name || '').toLowerCase().match(/\.(csv|xlsx|xls)$/);
            return m ? m[1] : 'xlsx';
        }

        function setOpenFile(state) {
            openFileName = state.name || '';
            openFileFormat = state.format || '';
            openFileHandle = state.handle || null;
            openFileIsTestData = !!state.isTestData;
            updateFilenameIndicator();
            updateSaveButtonState();
        }

        function updateFilenameIndicator() {
            const el = document.getElementById('filename-indicator');
            if (!el) return;
            if (!openFileName) {
                el.textContent = '(no file)';
                el.classList.remove('has-file');
                el.title = '';
            } else if (openFileIsTestData) {
                el.textContent = '(test data — unsaved)';
                el.classList.remove('has-file');
                el.title = '';
            } else {
                el.textContent = openFileName;
                el.classList.add('has-file');
                el.title = openFileName + (openFileHandle ? ' (linked — Save will overwrite)' : ' (Save will download)');
            }
        }

        function updateSaveButtonState() {
            const btn = document.getElementById('btn-save');
            if (!btn) return;
            const canSave = roles.length > 0 && (openFileHandle || (openFileName && !openFileIsTestData));
            btn.disabled = !canSave;
        }

        async function openFile() {
            if (HAS_FSA) {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'Org chart data',
                            accept: {
                                'text/csv': ['.csv'],
                                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'],
                                'application/vnd.ms-excel': ['.xls']
                            }
                        }],
                        excludeAcceptAllOption: false,
                        multiple: false
                    });
                    const file = await handle.getFile();
                    const buf = await file.arrayBuffer();
                    processImportData(buf);
                    setOpenFile({ name: file.name, format: detectFormat(file.name), handle: handle, isTestData: false });
                } catch (err) {
                    if (err && err.name === 'AbortError') return; // user cancelled
                    alert('Error opening file: ' + (err && err.message || err));
                }
            } else {
                document.getElementById('file-input').click();
            }
        }

        async function saveFile() {
            if (!roles.length) { alert('No data to save.'); return; }
            // .xls is read-only in SheetJS — upgrade to .xlsx on first save.
            if (openFileFormat === 'xls') {
                openFileFormat = 'xlsx';
                openFileName = openFileName.replace(/\.xls$/i, '.xlsx');
                if (openFileHandle) {
                    // The original .xls handle won't accept .xlsx content — fall back to Save As.
                    alert('This file was opened as .xls. SheetJS can only write .xlsx, so please choose a new location.');
                    openFileHandle = null;
                    return saveFileAs();
                }
            }

            const blob = openFileFormat === 'csv' ? rolesToCsvBlob(roles) : rolesToXlsxBlob(roles);

            if (openFileHandle && HAS_FSA) {
                try {
                    const writable = await openFileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    flashSaveIndicator('Saved');
                } catch (err) {
                    alert('Error saving file: ' + (err && err.message || err));
                }
            } else if (openFileName) {
                // Non-FSA fallback: download with the remembered filename.
                const url = URL.createObjectURL(blob);
                triggerDownload(url, openFileName);
                URL.revokeObjectURL(url);
                flashSaveIndicator('Downloaded');
            } else {
                return saveFileAs();
            }
            updateFilenameIndicator();
        }

        async function saveFileAs() {
            if (!roles.length) { alert('No data to save.'); return; }
            if (HAS_FSA) {
                try {
                    const suggested = openFileName || 'org-chart.xlsx';
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggested,
                        types: [
                            { description: 'Excel workbook', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } },
                            { description: 'CSV', accept: { 'text/csv': ['.csv'] } }
                        ]
                    });
                    const chosenName = handle.name || suggested;
                    const fmt = detectFormat(chosenName);
                    const blob = fmt === 'csv' ? rolesToCsvBlob(roles) : rolesToXlsxBlob(roles);
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    setOpenFile({ name: chosenName, format: fmt, handle: handle, isTestData: false });
                    flashSaveIndicator('Saved');
                } catch (err) {
                    if (err && err.name === 'AbortError') return;
                    alert('Error saving file: ' + (err && err.message || err));
                }
            } else {
                openSaveAsDialog();
            }
        }

        function openSaveAsDialog() {
            const dlg = document.getElementById('saveas-dialog');
            const nameInput = document.getElementById('saveas-name');
            const form = document.getElementById('saveas-form');
            nameInput.value = openFileName || 'org-chart.xlsx';
            const fmtRadios = form.querySelectorAll('input[name="saveas-fmt"]');
            const initialFmt = openFileFormat === 'csv' ? 'csv' : 'xlsx';
            fmtRadios.forEach(r => { r.checked = (r.value === initialFmt); });

            dlg.onclose = function() {
                // Only proceed when the user clicked Save. Escape / Cancel close with
                // a different (or empty) returnValue.
                if (dlg.returnValue !== 'save') return;
                let name = nameInput.value.trim() || 'org-chart.xlsx';
                const fmt = form.querySelector('input[name="saveas-fmt"]:checked').value;
                // Force extension to match selected format.
                if (!new RegExp('\\.' + fmt + '$', 'i').test(name)) {
                    name = name.replace(/\.(csv|xlsx|xls)$/i, '') + '.' + fmt;
                }
                const blob = fmt === 'csv' ? rolesToCsvBlob(roles) : rolesToXlsxBlob(roles);
                const url = URL.createObjectURL(blob);
                triggerDownload(url, name);
                URL.revokeObjectURL(url);
                setOpenFile({ name: name, format: fmt, handle: null, isTestData: false });
                flashSaveIndicator('Downloaded');
            };
            try { dlg.showModal(); } catch (err) { alert('Save As dialog unavailable in this browser.'); }
        }

        function flashSaveIndicator(text) {
            const el = document.getElementById('filename-indicator');
            if (!el) return;
            const original = el.textContent;
            el.textContent = text + ' ✓  ' + (openFileName || '');
            setTimeout(() => { updateFilenameIndicator(); }, 1400);
        }

        // --- Export / serialisation helpers ---
        const EXPORT_HEADERS = ['Role ID','Title','Status','Incumbent','Manager Role ID','Department','Cost to Company','Location','Gender','Employment Type','Working Pattern','Comments','Tags'];
        const EXPORT_FIELDS  = ['roleId','roleTitle','status','incumbentName','managerRoleId','department','costToCompany','location','incumbentGender','employmentType','workingPattern','comments','tags'];

        function parseTagString(val) {
            if (Array.isArray(val)) return val.map(t => String(t).trim()).filter(Boolean);
            return String(val || '').split(',').map(t => t.trim()).filter(Boolean);
        }

        function tagsToString(tags) {
            return Array.isArray(tags) ? tags.join(', ') : String(tags || '');
        }

        function fieldToCellValue(role, field) {
            if (field === 'tags') return tagsToString(role.tags);
            return role[field] !== undefined && role[field] !== null ? role[field] : '';
        }

        function rolesToCsvBlob(rs) {
            let csv = EXPORT_HEADERS.join(',') + '\n';
            rs.forEach(r => {
                csv += EXPORT_FIELDS.map(f => {
                    let v = String(fieldToCellValue(r, f));
                    if (v.includes(',') || v.includes('"') || v.includes('\n')) {
                        v = '"' + v.replace(/"/g, '""') + '"';
                    }
                    return v;
                }).join(',') + '\n';
            });
            return new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        }

        function rolesToXlsxBlob(rs) {
            const data = rs.map(r => {
                const row = {};
                EXPORT_FIELDS.forEach((f, i) => row[EXPORT_HEADERS[i]] = fieldToCellValue(r, f));
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Org Chart');
            const ab = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            return new Blob([ab], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        }

        function exportCSV() {
            if (!roles.length) { alert('No data to export.'); return; }
            const url = URL.createObjectURL(rolesToCsvBlob(roles));
            triggerDownload(url, 'org-chart.csv');
            URL.revokeObjectURL(url);
        }

        function exportExcel() {
            if (!roles.length) { alert('No data to export.'); return; }
            const url = URL.createObjectURL(rolesToXlsxBlob(roles));
            triggerDownload(url, 'org-chart.xlsx');
            URL.revokeObjectURL(url);
        }

        // --- Render ---
        function render() {
            renderTable();
            if (activeTab === 'chart') renderChart();
            if (activeTab === 'pivot') renderPivotTable();
            updateSaveButtonState();
        }

        // --- Export / Print ---

        function printChart() {
            const oc = document.querySelector('#chart-container .orgchart');
            if (!oc) return;
            const prevTransform = oc.style.transform;
            oc.style.transform = ''; // clear pan/zoom override, keep CSS-defined rotation for l2r/r2l/b2t
            window.print();
            oc.style.transform = prevTransform;
        }

        function downloadPNG() {
            const oc = document.querySelector('#chart-container .orgchart');
            if (!oc) { alert('Render the chart before exporting.'); return; }
            const prevTransform = oc.style.transform;
            oc.style.transform = '';
            html2canvas(oc, {
                scale: 3,
                backgroundColor: '#FAF8F5',
                useCORS: true,
                logging: false
            }).then(function(canvas) {
                oc.style.transform = prevTransform;
                canvas.toBlob(function(blob) {
                    triggerDownload(URL.createObjectURL(blob), 'org-chart.png');
                }, 'image/png');
            }).catch(function() {
                oc.style.transform = prevTransform;
                alert('Failed to render chart image.');
            });
        }

        function triggerDownload(href, filename) {
            const a = document.createElement('a');
            a.href = href;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- Init ---
        renderFieldsDropdown();
        render();
        updateFilenameIndicator();
        syncFilterUI();
    </script>
</body>
</html>
