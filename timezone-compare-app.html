<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Timeboard</title>
<style>
  :root{
    --bg:#f6f7fb;
    --panel:#ffffff;
    --line:#e3e7ef;
    --text:#1f2633;
    --muted:#6b7280;
    --accent:#2563eb;
    --night:#e6e7ea;          /* 10pm–5am */
    --day:#edf5ff;            /* 6am–10pm */
    --work:#fff8d8;           /* 8am–5pm */
    --hover:#f0fdf4;          /* column hover - light green */
    --hover-border:#22c55e;   /* column hover border - darker green */
  }
  html,body{height:100%;}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    background:var(--bg);
    color:var(--text);
  }
  .app{max-width:1200px;margin:16px auto;padding:12px;background:var(--panel);border-radius:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
  .topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap}
  .left, .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .searchbox{position:relative}
  .searchbox input{
    width:300px;max-width:50vw;padding:6px 8px 6px 28px;border:1px solid var(--line);border-radius:8px;background:#fff;outline:none;font-size:13px;
  }
  .searchbox svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.5;width:14px;height:14px}
  .pill{border:1px dashed var(--line);padding:4px 8px;border-radius:8px;font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn{appearance:none;border:1px solid var(--line);padding:6px 10px;border-radius:8px;background:#fff;cursor:pointer;font-size:12px}
  .btn.primary{border-color:transparent;background:var(--accent);color:#fff}
  .btn:active{transform:translateY(1px)}
  .dropdown{position:absolute;z-index:100;top:36px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.08);max-height:240px;overflow:auto;display:none}
  .dropdown.show{display:block}
  .dropdown div{padding:8px 10px;cursor:pointer;font-size:12px}
  .dropdown div:hover{background:#f3f6ff}

  .grid{width:100%;border-collapse:separate;border-spacing:0 6px}
  .board-scroll-wrapper{overflow-x:auto;overflow-y:visible}
  .board-scroll-wrapper::-webkit-scrollbar{height:6px}
  .board-scroll-wrapper::-webkit-scrollbar-track{background:var(--bg);border-radius:3px}
  .board-scroll-wrapper::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .board-scroll-wrapper::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  .board-content{display:inline-block;min-width:100%}
  .row-head{display:flex;align-items:center;gap:6px;width:200px;min-width:200px;position:sticky;left:0;background:var(--panel);z-index:10;box-shadow:2px 0 4px rgba(0,0,0,0.05)}
  .row{display:flex;align-items:stretch;position:relative}
  .row + .row{margin-top:4px}
  .col-city{display:flex;align-items:center;gap:6px;padding:6px 4px}
  .offset-badge{min-width:28px;text-align:center;font-weight:600;color:var(--muted);cursor:pointer;flex-shrink:0;font-size:11px}
  .offset-badge.home{color:var(--accent)}
  .city-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
  .city-line{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .city{font-weight:700;font-size:12px}
  .tz-badge{display:inline-block;background:var(--line);padding:1px 4px;border-radius:3px;font-size:9px;font-weight:600;color:var(--muted)}
  .location{font-size:10px;color:var(--muted)}
  .x{margin-left:auto;cursor:pointer;color:#a1a1aa;flex-shrink:0;font-size:14px}
  .x:hover{color:#ef4444}
  .cells{display:grid;grid-template-columns:repeat(24, 36px);border-left:1px solid var(--line);position:relative}
  .cell{position:relative;border-right:1px solid var(--line);text-align:center;padding:4px 0 3px 0;font-size:11px;z-index:2}
  .ampm{display:block;font-size:9px;color:var(--muted)}
  .datebox{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;font-weight:700}
  .datebox .mon{font-size:9px;color:#667085;line-height:10px}
  .datebox .day{font-size:12px}
  .night{background:var(--night)}
  .day{background:var(--day)}
  .work{background:var(--work)}
  .hovercol{position:absolute;top:0;bottom:0;background:rgba(34, 197, 94, 0.12);border-left:2px solid var(--hover-border);border-right:2px solid var(--hover-border);pointer-events:none;z-index:3}
  .hourlabel{font-weight:700}

  .legend{display:flex;gap:6px;align-items:center;color:var(--muted);font-size:10px;flex-wrap:wrap}
  .legend .swatch{width:12px;height:12px;border:1px solid var(--line);border-radius:2px}
  .swatch.night{background:var(--night)}
  .swatch.day{background:var(--day)}
  .swatch.work{background:var(--work)}
  .swatch.hover{background:rgba(34, 197, 94, 0.12);border:1px solid var(--hover-border)}

  .saved-indicator{
    position:fixed;
    bottom:16px;
    right:16px;
    background:var(--accent);
    color:#fff;
    padding:6px 12px;
    border-radius:6px;
    font-size:11px;
    opacity:0;
    transition:opacity 0.3s;
    pointer-events:none;
    box-shadow:0 4px 12px rgba(37,99,235,.3);
  }
  .saved-indicator.show{opacity:1}

  @media (max-width:900px){
    .row-head{min-width:160px;width:160px}
    .cells{grid-template-columns:repeat(24, 32px)}
    .city-line{flex-wrap:wrap}
    .city{font-size:11px}
    .location{font-size:9px}
    .searchbox input{width:200px}
    .topbar{gap:6px}
    .left, .right{gap:6px}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="left">
      <div class="searchbox">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="search" type="text" placeholder="Place or timezone" autocomplete="off"/>
        <div id="dropdown" class="dropdown"></div>
      </div>
      <div class="legend">
        <span class="swatch night"></span> 10pm–5am
        <span class="swatch day"></span> 6am–10pm
        <span class="swatch work"></span> 8am–5pm
        <span class="swatch hover"></span> hover compare
      </div>
    </div>
    <div class="right">
      <button id="share" class="btn">🔗 Share Link</button>
      <span id="shareurl" class="pill" title="Click the button to generate a shareable link"></span>
      <button id="reset" class="btn">Reset</button>
    </div>
  </div>

  <div id="board"></div>
</div>

<div id="savedIndicator" class="saved-indicator">✓ Saved</div>

<script>
// ------- Utilities -------
const pad = n => String(n).padStart(2,'0');
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

// Get offset minutes for a timezone at a given Date (DST aware)
function tzOffsetMinutes(tz, date=new Date()){
  const dtf = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second:'2-digit'
  });
  const parts = dtf.formatToParts(date);
  const map = {};
  for (const p of parts) map[p.type] = p.value;
  const tzTime = Date.UTC(map.year, map.month-1, map.day, map.hour, map.minute, map.second);
  return (tzTime - date.getTime()) / 60000; // minutes difference from UTC
}

function hoursAhead(baseTZ, otherTZ){
  const d = new Date();
  const diffMin = tzOffsetMinutes(otherTZ, d) - tzOffsetMinutes(baseTZ, d);
  return Math.round(diffMin / 15) / 4; // round to nearest quarter-hour
}

function fmt12(h){
  const hour = (h % 12) || 12;
  const ampm = h < 12 ? 'am' : 'pm';
  return {hour, ampm};
}

// Generate a Date for the home-tz for column index (0..23) starting at startHour
function colDate(homeTZ, startHour, colIdx){
  // Use today per home TZ
  const now = new Date();
  const dtf = new Intl.DateTimeFormat('en-US', { timeZone: homeTZ, year:'numeric', month:'2-digit', day:'2-digit'});
  const parts = Object.fromEntries(dtf.formatToParts(now).map(p=>[p.type,p.value]));
  const y = Number(parts.year), m = Number(parts.month)-1, d = Number(parts.day);
  // hour sequence wraps 24 hrs from startHour
  const hour = (startHour + colIdx) % 24;
  const dayShift = Math.floor((startHour + colIdx)/24);
  const base = new Date(Date.UTC(y, m, d + dayShift, hour, 0, 0));
  // Convert from UTC date components to a timestamp representing the same wall clock time in homeTZ
  // We adjust by the homeTZ offset to get an absolute instant
  const offMin = tzOffsetMinutes(homeTZ, base);
  return new Date(base.getTime() - offMin*60000);
}

function atTZ(date, tz){
  // Return y,m,d,h for "date" viewed in timezone tz
  const dtf = new Intl.DateTimeFormat('en-US', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit', hour12:false, hour:'2-digit'});
  const p = Object.fromEntries(dtf.formatToParts(date).map(x=>[x.type,x.value]));
  return { y:+p.year, m:+p.month, d:+p.day, h:+p.hour };
}

function getTZAbbr(tz){
  // Get timezone abbreviation like GMT, EST, PST, etc.
  try {
    const date = new Date();
    const dtf = new Intl.DateTimeFormat('en-US', { 
      timeZone: tz, 
      timeZoneName: 'short'
    });
    const parts = dtf.formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : '';
  } catch (e) {
    return '';
  }
}

// ------- Data: timezones & city labels -------

// Friendly label overrides for IANA IDs where the zone name is
// misleading, outdated, or doesn't match the best-known city.
const LABEL_OVERRIDES = {

  'Europe/Istanbul':        'Istanbul, Turkey',

  'Europe/Kiev':            'Kyiv, Ukraine',
  'Africa/Johannesburg':    'Johannesburg, South Africa',
  'Africa/Lagos':           'Lagos, Nigeria',
  'Africa/Cairo':           'Cairo, Egypt',
  'Africa/Nairobi':         'Nairobi, Kenya',
  'Africa/Casablanca':      'Casablanca, Morocco',
  'Africa/Accra':           'Accra, Ghana',
  'Africa/Dar_es_Salaam':   'Dar es Salaam, Tanzania',

  'Asia/Singapore':         'Singapore',

  'Asia/Tehran':            'Tehran, Iran',
  'Asia/Karachi':           'Karachi, Pakistan',
  'Asia/Dhaka':             'Dhaka, Bangladesh',
  'Asia/Bangkok':           'Bangkok, Thailand',
  'Asia/Ho_Chi_Minh':       'Ho Chi Minh City, Vietnam',
  'Asia/Jakarta':           'Jakarta, Indonesia',
  'Asia/Manila':            'Manila, Philippines',

// Extra searchable aliases — cities that share a tz with another IANA zone
// but are important enough to surface by name in search results.
const CITY_ALIASES = [
  {label:'Stuttgart, Germany',        tz:'Europe/Berlin'},
  {label:'Munich, Germany',           tz:'Europe/Berlin'},
  {label:'Frankfurt, Germany',        tz:'Europe/Berlin'},
  {label:'Houston, USA',              tz:'America/Chicago'},
  {label:'Dallas, USA',               tz:'America/Chicago'},
  {label:'San Francisco, USA',        tz:'America/Los_Angeles'},
  {label:'Seattle, USA',              tz:'America/Los_Angeles'},
  {label:'Boston, USA',               tz:'America/New_York'},
  {label:'Washington DC, USA',        tz:'America/New_York'},
  {label:'Miami, USA',                tz:'America/New_York'},
  {label:'Atlanta, USA',              tz:'America/New_York'},
  {label:'Montreal, Canada',          tz:'America/Toronto'},
  {label:'Cape Town, South Africa',   tz:'Africa/Johannesburg'},
  {label:'Lima, Peru',                tz:'America/Lima'},
  {label:'Santiago, Chile',           tz:'America/Santiago'},
  {label:'Barcelona, Spain',          tz:'Europe/Madrid'},
  {label:'Milan, Italy',              tz:'Europe/Rome'},
  {label:'Lisbon, Portugal',          tz:'Europe/Lisbon'},
  {label:'Copenhagen, Denmark',       tz:'Europe/Copenhagen'},
  {label:'Helsinki, Finland',         tz:'Europe/Helsinki'},
  {label:'Oslo, Norway',              tz:'Europe/Oslo'},
  {label:'Brussels, Belgium',         tz:'Europe/Brussels'},
  {label:'Athens, Greece',            tz:'Europe/Athens'},
  {label:'St. Petersburg, Russia',    tz:'Europe/Moscow'},
  {label:'Colombo, Sri Lanka',        tz:'Asia/Colombo'},
  {label:'Hanoi, Vietnam',            tz:'Asia/Ho_Chi_Minh'},
  {label:'Shenzhen, China',           tz:'Asia/Shanghai'},
  {label:'Guangzhou, China',          tz:'Asia/Shanghai'},
  {label:'Delhi, India',              tz:'Asia/Kolkata'},
  {label:'Bangalore, India',          tz:'Asia/Kolkata'},
  {label:'Hyderabad, India',          tz:'Asia/Kolkata'},
  {label:'Chennai, India',            tz:'Asia/Kolkata'},
];

// Popularity tiers (5 = megacity, 1 = default) — used to rank search results.
const POP_TIER = {
  'Asia/Tokyo':5, 'Asia/Shanghai':5, 'America/New_York':5, 'Europe/London':5,
  'Asia/Kolkata':5, 'America/Sao_Paulo':5, 'Africa/Lagos':5, 'Africa/Cairo':5,
  'America/Mexico_City':5, 'Asia/Jakarta':4, 'Asia/Seoul':4, 'Asia/Bangkok':4,
  'Asia/Dhaka':4, 'Asia/Karachi':4, 'Asia/Manila':4, 'Asia/Dubai':4,
  'America/Chicago':4, 'America/Los_Angeles':4, 'America/Toronto':4,
  'Europe/Berlin':4, 'Europe/Paris':4, 'Europe/Madrid':4, 'Europe/Rome':4,
  'Europe/Moscow':4, 'Europe/Istanbul':4, 'Asia/Singapore':4,
  'Asia/Hong_Kong':4, 'Asia/Kuala_Lumpur':4, 'Asia/Taipei':4, 'Asia/Ho_Chi_Minh':4,
  'Asia/Tehran':4, 'Asia/Riyadh':4, 'Africa/Johannesburg':4, 'Africa/Nairobi':3,
  'Africa/Casablanca':3, 'Africa/Accra':3, 'America/Bogota':4, 'America/Lima':3,
  'America/Argentina/Buenos_Aires':4, 'America/Santiago':3, 'America/Vancouver':3,
  'America/Denver':3, 'Europe/Amsterdam':3, 'Europe/Zurich':3, 'Europe/Stockholm':3,
  'Europe/Vienna':3, 'Europe/Warsaw':3, 'Europe/Prague':3, 'Europe/Bucharest':3,
  'Europe/Dublin':3, 'Europe/Kyiv':3, 'Europe/Athens':3, 'Europe/Helsinki':3,
  'Europe/Oslo':3, 'Europe/Copenhagen':3, 'Europe/Brussels':3, 'Europe/Lisbon':3,
  'Australia/Sydney':3, 'Australia/Melbourne':3, 'Pacific/Auckland':3,
  'Australia/Perth':3, 'Australia/Brisbane':3, 'Australia/Adelaide':3,
  'Pacific/Honolulu':2, 'America/Anchorage':2, 'America/Halifax':2,
  'America/Edmonton':2, 'America/Winnipeg':2, 'America/Phoenix':2,
  'America/St_Johns':2, 'Pacific/Fiji':2,
};

const REGION_LABELS = {
  America:'Americas', Asia:'Asia', Europe:'Europe', Africa:'Africa',
  Pacific:'Pacific', Indian:'Indian Ocean', Australia:'Australia', Atlantic:'Atlantic',
  Antarctica:'Antarctica', Arctic:'Arctic',
};

// Build the searchable directory from browser-supported IANA zones
function buildDirectory() {
  let zones = [];
  try { if (Intl.supportedValuesOf) zones = Intl.supportedValuesOf('timeZone'); } catch(e){}

  // Derive friendly labels from IANA IDs, with overrides
  const fromIANA = zones
    .filter(tz => tz.includes('/') && !tz.startsWith('Etc/'))
    .map(tz => {
      if (LABEL_OVERRIDES[tz]) return { label: LABEL_OVERRIDES[tz], tz, tier: POP_TIER[tz] || 1 };
      const parts = tz.split('/');
      const city = parts[parts.length - 1].replace(/_/g, ' ');
      const region = REGION_LABELS[parts[0]] || parts[0];
      return { label: city + ', ' + region, tz, tier: POP_TIER[tz] || 1 };
    });

  // Merge in aliases (only if the alias label isn't already present)
  const labelSet = new Set(fromIANA.map(e => e.label.toLowerCase()));
  const aliases = CITY_ALIASES
    .filter(a => !labelSet.has(a.label.toLowerCase()))
    .map(a => ({ label: a.label, tz: a.tz, tier: POP_TIER[a.tz] || 2 }));

  // Combine and sort by tier (descending), then alphabetical
  const combined = [...fromIANA, ...aliases];
  combined.sort((a, b) => b.tier - a.tier || a.label.localeCompare(b.label));
  return combined;
}

const DIRECTORY = buildDirectory();

// ------- State -------
const STORAGE_KEY = 'world-timeboard-state-v1';

function defaultState(){
  return {
    startHour: 1, // home row starts 1am
    rows: [
      {label:'London, United Kingdom', tz:'Europe/London', home:true},
      {label:'New York, USA', tz:'America/New_York'},
      {label:'Berlin, Germany', tz:'Europe/Berlin'},
      {label:'Johannesburg, South Africa', tz:'Africa/Johannesburg'}
    ]
  };
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.rows)) return defaultState();

    parsed.rows = parsed.rows
      .map(r => ({ label: r.label, tz: r.tz, home: !!r.home }))
      .filter(r => r.label && r.tz);

    if (!parsed.rows.length) return defaultState();
    if (!parsed.rows.some(r => r.home)) parsed.rows[0].home = true;

    parsed.startHour = typeof parsed.startHour === 'number'
      ? ((parsed.startHour % 24) + 24) % 24
      : 1;

    return parsed;
  } catch (e) {
    return defaultState();
  }
}

let state = loadState();

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showSavedIndicator();
  } catch (e) {
    // ignore storage errors (private mode, etc.)
    console.warn('Failed to save to localStorage:', e);
  }
}

function showSavedIndicator(){
  const indicator = document.getElementById('savedIndicator');
  indicator.classList.add('show');
  setTimeout(() => indicator.classList.remove('show'), 1500);
}

// Load from URL if present (shared links override stored state)
(function initFromURL(){
  const params = new URLSearchParams(location.search);
  // Use raw query string so separator commas are not confused with decoded label commas
  const rawZonesMatch = location.search.match(/[?&]zones=([^&]*)/);
  const packed = rawZonesMatch ? rawZonesMatch[1] : null;
  const home = params.get('home');
  const start = params.get('start');
  if (packed){
    const parts = packed.split(',').map(s=>decodeURIComponent(s));
    state.rows = parts.map(p=>{
      const pipeIdx = p.indexOf('|');
      const [label, tz] = pipeIdx >= 0 ? [p.slice(0, pipeIdx), p.slice(pipeIdx + 1)] : [p, p];
      return {label, tz, home:false};
    });
    const idx = state.rows.findIndex(r=>r.tz===home);
    if (idx>=0) state.rows[idx].home = true; else if (state.rows.length) state.rows[0].home=true;
  }
  if (start !== null) {
    const parsed = parseInt(start, 10);
    state.startHour = Math.max(0, Math.min(23, isNaN(parsed) ? 1 : parsed));
  }
})();

function setHome(index){
  state.rows.forEach((r,i)=>r.home = i===index);
  saveState(); // ADDED: Save when home changes
  render();
}

function removeRow(index){ 
  state.rows.splice(index,1); 
  if (!state.rows.some(r=>r.home) && state.rows[0]) state.rows[0].home=true; 
  saveState(); // ADDED: Save when row is removed
  render(); 
}

// ------- Rendering -------
const board = document.getElementById('board');
let hoverIdx = -1; // column hovered

function render(){
  const home = state.rows.find(r=>r.home) || state.rows[0];
  if (!home) { board.innerHTML = '<div class="pill">No places yet. Add one above.</div>'; return; }

  // Pre-compute the 24 column instants (absolute dates) relative to home tz & startHour
  const instants = Array.from({length:24}, (_,i)=> colDate(home.tz, state.startHour, i));

  board.innerHTML = '';
  
  // Create scroll wrapper
  const scrollWrapper = document.createElement('div');
  scrollWrapper.className = 'board-scroll-wrapper';
  
  const boardContent = document.createElement('div');
  boardContent.className = 'board-content';
  
  state.rows.forEach((row, idx)=>{
    const wrap = document.createElement('div');
    wrap.className = 'row';

    // Head section
    const head = document.createElement('div');
    head.className = 'row-head col-city';
    const off = hoursAhead(home.tz, row.tz);

    const offEl = document.createElement('div');
    offEl.className = 'offset-badge' + (row.home? ' home':'');
    offEl.title = row.home? 'Home timezone' : 'Click to make home timezone';
    offEl.innerHTML = row.home ? '🏠' : (off>0? '+'+off: off);
    offEl.addEventListener('click', ()=> setHome(idx));

    // Split label into city and location
    const labelParts = row.label.split(',').map(s => s.trim());
    const cityName = labelParts[0] || row.label;
    const location = labelParts.slice(1).join(', ');
    const tzAbbr = getTZAbbr(row.tz);

    const cityInfo = document.createElement('div');
    cityInfo.className = 'city-info';

    const cityLine = document.createElement('div');
    cityLine.className = 'city-line';

    const city = document.createElement('span');
    city.className = 'city';
    city.textContent = cityName;

    const tzBadge = document.createElement('span');
    tzBadge.className = 'tz-badge';
    tzBadge.textContent = tzAbbr || row.tz;

    cityLine.append(city, tzBadge);

    if (location) {
      const locSpan = document.createElement('div');
      locSpan.className = 'location';
      locSpan.textContent = location;
      cityInfo.append(cityLine, locSpan);
    } else {
      cityInfo.appendChild(cityLine);
    }

    const close = document.createElement('div');
    close.className = 'x';
    close.textContent = '✕';
    close.title = 'Remove row';
    close.addEventListener('click', ()=> removeRow(idx));

    head.append(offEl, cityInfo, close);

    // Cells section (no wrapper)
    const cells = document.createElement('div');
    cells.className = 'cells';

    instants.forEach((instant, col)=>{
      const loc = atTZ(instant, row.tz);
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.col = col;

      // Background bands
      const hour = loc.h;
      const inNight = (hour>=22 || hour<=5);
      const inWork = (hour>=8 && hour<=17);
      const inDay = !inNight; // 6..21
      if (inDay) c.classList.add('day');
      if (inNight) c.classList.add('night');
      if (inWork) c.classList.add('work');

      // Content
      if (hour===0){
        const db = document.createElement('div');
        db.className = 'datebox';
        db.innerHTML = `<div class="mon">${MONTHS[loc.m-1]}</div><div class="day">${loc.d}</div>`;
        c.appendChild(db);
      } else {
        const {hour:hh, ampm} = fmt12(hour);
        c.innerHTML = `<span class="hourlabel">${hh}</span><span class="ampm">${ampm}</span>`;
      }

      // Hover behavior: highlight same column everywhere
      c.addEventListener('mouseenter', ()=> highlightColumn(col));
      c.addEventListener('mouseleave', ()=> highlightColumn(-1));
      c.addEventListener('click', ()=> highlightColumn(col));

      cells.appendChild(c);
    });

    wrap.append(head, cells);
    boardContent.appendChild(wrap);
  });

  scrollWrapper.appendChild(boardContent);
  board.appendChild(scrollWrapper);
  
  drawHover();
}

function highlightColumn(i){ hoverIdx = i; drawHover(); }

function drawHover(){
  // Clear previous overlays
  document.querySelectorAll('.hovercol').forEach(e=>e.remove());
  if (hoverIdx<0) return;
  document.querySelectorAll('.cells').forEach(cells=>{
    const col = document.createElement('div');
    col.className = 'hovercol';
    const cellWidth = cells.clientWidth / 24;
    col.style.left = (hoverIdx * cellWidth) + 'px';
    col.style.width = cellWidth + 'px';
    cells.appendChild(col);
  });
}

// ------- Search -------
const search = document.getElementById('search');
const dropdown = document.getElementById('dropdown');
let ddIdx = -1; // highlighted suggestion

function openDropdown(items){
  dropdown.innerHTML = '';
  items.slice(0,60).forEach((item, i)=>{
    const d = document.createElement('div');
    d.textContent = `${item.label}  —  ${item.tz}`;
    d.addEventListener('click', ()=> { addRow(item); closeDropdown(); });
    dropdown.appendChild(d);
  });
  dropdown.classList.add('show');
}
function closeDropdown(){ dropdown.classList.remove('show'); ddIdx=-1; }

function addRow(item){
  state.rows.push({label:item.label, tz:item.tz});
  saveState(); // ADDED: Save when row is added
  render();
  search.value='';
}

search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if (!q){ closeDropdown(); return; }
  const results = DIRECTORY.filter(x=> x.label.toLowerCase().includes(q) || x.tz.toLowerCase().includes(q));
  // Boost entries whose label starts with the query
  results.sort((a, b) => {
    const aStarts = a.label.toLowerCase().startsWith(q) ? 1 : 0;
    const bStarts = b.label.toLowerCase().startsWith(q) ? 1 : 0;
    if (bStarts !== aStarts) return bStarts - aStarts;
    return (b.tier||1) - (a.tier||1);
  });
  if (results.length){ openDropdown(results); } else { closeDropdown(); }
});
search.addEventListener('keydown', (e)=>{
  if (!dropdown.classList.contains('show')) return;
  const items = Array.from(dropdown.children);
  if (e.key==='ArrowDown'){ ddIdx = Math.min(items.length-1, ddIdx+1); items.forEach((el,i)=> el.style.background = i===ddIdx?'#eef3ff':'' ); e.preventDefault(); }
  if (e.key==='ArrowUp'){ ddIdx = Math.max(0, ddIdx-1); items.forEach((el,i)=> el.style.background = i===ddIdx?'#eef3ff':'' ); e.preventDefault(); }
  if (e.key==='Enter' && ddIdx>=0){ items[ddIdx].click(); }
  if (e.key==='Escape'){ closeDropdown(); }
});

// Close dropdown if clicking elsewhere
window.addEventListener('click', (e)=>{ if (!document.querySelector('.searchbox').contains(e.target)) closeDropdown(); });

// ------- Shareable Link -------
function buildShareURL(){
  const zones = state.rows.map(r=> encodeURIComponent(`${r.label}|${r.tz}`)).join(',');
  const home = encodeURIComponent((state.rows.find(r=>r.home)||state.rows[0]).tz);
  const start = state.startHour;
  const url = `${location.origin}${location.pathname}?zones=${zones}&home=${home}&start=${start}`;
  return url;
}

const shareBtn = document.getElementById('share');
const shareOut = document.getElementById('shareurl');
shareBtn.addEventListener('click', ()=>{
  const url = buildShareURL();
  shareOut.textContent = url;
  shareOut.title = 'Share this URL';
  navigator.clipboard && navigator.clipboard.writeText(url).catch(()=>{});
});

// Reset
document.getElementById('reset').addEventListener('click', ()=>{
  history.replaceState({}, '', location.pathname);
  state = { startHour:1, rows:[
    {label:'London, United Kingdom', tz:'Europe/London', home:true},
    {label:'New York, USA', tz:'America/New_York'},
    {label:'Berlin, Germany', tz:'Europe/Berlin'},
    {label:'Johannesburg, South Africa', tz:'Africa/Johannesburg'}
  ]};
  saveState(); // ADDED: Save when resetting
  render();
});

// initial render
render();

// Keep hover overlays positioned on resize
window.addEventListener('resize', drawHover);
</script>
